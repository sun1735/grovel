<!DOCTYPE html>
<html lang="ko">
<head>
<script>(function(){try{var t=localStorage.getItem('mt-theme');var d=t==='dark'||(!t&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches);if(d)document.documentElement.classList.add('dark');}catch(e){}})();</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>광고대행사 디렉토리 — 마케톡</title>
<meta name="description" content="검증된 마케팅 대행사를 한곳에서. 네이버·카카오·메타·구글 광고부터 콘텐츠·디자인·데이터 컨설팅까지." />
<link rel="stylesheet" href="/tailwind.css" />
<script src="/lucide.min.js"></script>
<style>
  body { background:#f6f7f9; color:#15171c; }
  .container-x { max-width:1240px; margin:0 auto; padding:0 1rem; }
  .card { background-color:#fff; border:1px solid #eaecef; border-radius:14px; }
  .lift { transition: all .2s; }
  .lift:hover { transform: translateY(-2px); border-color:#d1d5db; box-shadow:0 8px 24px -12px rgba(0,0,0,.12); }
  .chip { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; }
  .c-naver { background:#dcfce7; color:#15803d; }
  .c-kakao { background:#fef3c7; color:#a16207; }
  .c-meta  { background:#dbeafe; color:#1d4ed8; }
  .c-google{ background:#fee2e2; color:#b91c1c; }
  .c-youtube{ background:#fee2e2; color:#b91c1c; }
  .c-tiktok{ background:#f3e8ff; color:#7e22ce; }
  .c-coupang{ background:#ffedd5; color:#9a3412; }
  .c-smartstore{ background:#dcfce7; color:#15803d; }
  .c-content{ background:#fce7f3; color:#be185d; }
  .c-design{ background:#e0e7ff; color:#3730a3; }
  .c-data { background:#cffafe; color:#0e7490; }
  .c-seo  { background:#d1fae5; color:#047857; }
  .c-brand{ background:#fef3c7; color:#92400e; }
  .verified-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:999px; background:#dbeafe; color:#1d4ed8; font-size:10px; font-weight:700; }
</style>
</head>
<body class="antialiased">

<!-- 다크 톱바 (다른 페이지와 동일) -->
<div class="bg-ink text-white text-xs">
  <div class="container-x flex items-center justify-between h-9">
    <div class="flex items-center gap-4">
      <a href="/" class="text-white/80 hover:text-white">← 마케톡 메인</a>
    </div>
    <div class="flex items-center gap-3 text-white/70">
      <a href="/login.html" class="hover:text-white">로그인</a>
      <span class="text-white/30">|</span>
      <a href="/login.html#register" class="hover:text-white">회원가입</a>
    </div>
  </div>
</div>

<!-- 헤더 -->
<header class="bg-white border-b border-black/5">
  <div class="container-x flex items-center gap-4 h-16">
    <a href="/" class="flex items-center gap-2.5">
      <img src="/logo.svg" alt="마케톡" class="w-9 h-9" />
      <div class="leading-tight">
        <div class="font-extrabold text-lg tracking-tight">마케톡</div>
        <div class="text-[10px] text-black/50">광고대행사 디렉토리</div>
      </div>
    </a>
    <div class="flex-1"></div>
    <a href="/" class="text-sm text-black/55 hover:text-black">← 커뮤니티로</a>
  </div>
</header>

<main class="container-x my-8 space-y-6">

  <!-- 헤더 섹션 -->
  <div class="text-center max-w-2xl mx-auto py-6">
    <div class="inline-flex items-center gap-2 bg-brand-50 text-brand-700 px-3 py-1 rounded-full text-[12px] font-bold mb-3">
      <i data-lucide="building-2" class="w-3.5 h-3.5"></i>
      AGENCY DIRECTORY
    </div>
    <h1 class="text-3xl md:text-4xl font-black tracking-tight">검증된 마케팅 대행사를 한곳에서</h1>
    <p class="text-sm text-black/55 mt-3">네이버·카카오·메타·구글 광고부터 콘텐츠·디자인·데이터 컨설팅까지. 실무자 추천 + 운영자 검증.</p>
  </div>

  <!-- 필터 -->
  <div class="card p-4">
    <div class="flex items-center gap-3 flex-wrap">
      <div class="flex items-center gap-2 flex-1 min-w-[240px]">
        <i data-lucide="search" class="w-4 h-4 text-black/40"></i>
        <input id="q" type="text" placeholder="대행사 이름·전문분야 검색..."
               class="flex-1 h-9 px-3 rounded-md bg-paper border border-black/5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/20" />
      </div>
      <select id="specialty" class="h-9 px-3 rounded-md bg-paper border border-black/5 text-sm">
        <option value="all">전체 전문분야</option>
        <option value="naver">네이버 광고</option>
        <option value="kakao">카카오 광고</option>
        <option value="meta">메타 광고</option>
        <option value="google">구글 광고</option>
        <option value="youtube">유튜브</option>
        <option value="tiktok">틱톡</option>
        <option value="coupang">쿠팡</option>
        <option value="smartstore">스마트스토어</option>
        <option value="content">콘텐츠</option>
        <option value="design">디자인</option>
        <option value="data">데이터/컨설팅</option>
        <option value="seo">SEO</option>
      </select>
      <select id="size" class="h-9 px-3 rounded-md bg-paper border border-black/5 text-sm">
        <option value="all">전체 규모</option>
        <option value="1-5">1-5인</option>
        <option value="6-15">6-15인</option>
        <option value="16-50">16-50인</option>
        <option value="50+">50인 이상</option>
      </select>
    </div>
  </div>

  <!-- 결과 -->
  <div id="result-meta" class="text-sm text-black/55"></div>
  <div id="agency-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
    <div class="card p-6 animate-pulse"><div class="h-5 bg-black/5 rounded w-2/3 mb-3"></div><div class="h-3 bg-black/5 rounded w-full"></div></div>
    <div class="card p-6 animate-pulse"><div class="h-5 bg-black/5 rounded w-2/3 mb-3"></div><div class="h-3 bg-black/5 rounded w-full"></div></div>
    <div class="card p-6 animate-pulse"><div class="h-5 bg-black/5 rounded w-2/3 mb-3"></div><div class="h-3 bg-black/5 rounded w-full"></div></div>
  </div>

  <!-- 안내 -->
  <div class="card p-5 bg-gradient-to-br from-paper to-white text-center">
    <div class="text-sm font-bold mb-2">우리 대행사도 등록하고 싶어요</div>
    <p class="text-[12px] text-black/55">관리자 인증 후 등록 가능합니다. 현재는 수동 검토 중입니다.</p>
    <a href="https://pf.kakao.com/_Yxnwxfn/chat" target="_blank" rel="noopener"
       class="inline-flex items-center gap-1.5 mt-3 px-4 py-2 rounded-md text-[12px] font-bold hover:opacity-95 transition"
       style="background:#FEE500;color:#191919">
      <svg width="13" height="13" viewBox="0 0 20 20"><path fill="#191919" d="M10 1C5.03 1 1 4.17 1 8.09c0 2.54 1.66 4.77 4.17 6.05l-1.06 3.88c-.09.34.28.61.58.43l4.5-2.96c.27.03.54.04.81.04 4.97 0 9-3.17 9-7.09S14.97 1 10 1"/></svg>
      카카오톡으로 등록 문의 →
    </a>
  </div>
</main>

<footer class="border-t border-black/5 bg-white py-8">
  <div class="container-x text-center text-xs text-black/45 space-x-3">
    <a href="/" class="hover:text-black">메인</a>
    <span>·</span>
    <a href="/agencies.html" class="hover:text-black font-bold text-black">대행사 디렉토리</a>
    <span>·</span>
    <a href="/terms.html" class="hover:text-black">이용약관</a>
    <span>·</span>
    <a href="/privacy.html" class="hover:text-black">개인정보처리방침</a>
  </div>
</footer>

<script>
  lucide.createIcons();
  const $ = (s) => document.querySelector(s);
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  const SPEC_LABEL = {
    naver:'네이버', kakao:'카카오', meta:'메타', google:'구글', youtube:'유튜브',
    tiktok:'틱톡', coupang:'쿠팡', smartstore:'스마트스토어',
    content:'콘텐츠', design:'디자인', data:'데이터', seo:'SEO', brand:'브랜드'
  };

  async function loadAgencies() {
    const params = new URLSearchParams();
    const q = $('#q').value.trim();
    const sp = $('#specialty').value;
    const sz = $('#size').value;
    if (q) params.set('q', q);
    if (sp !== 'all') params.set('specialty', sp);
    if (sz !== 'all') params.set('size', sz);

    try {
      const r = await fetch('/api/agencies?' + params.toString());
      const { agencies } = await r.json();
      $('#result-meta').textContent = `총 ${agencies.length}개 대행사`;

      if (agencies.length === 0) {
        $('#agency-grid').innerHTML = `
          <div class="md:col-span-2 lg:col-span-3 card p-12 text-center text-sm text-black/45">
            조건에 맞는 대행사가 없습니다. 필터를 바꿔보세요.
          </div>`;
        return;
      }

      $('#agency-grid').innerHTML = agencies.map(a => {
        const specs = (a.specialties || '').split(',').filter(Boolean);
        const initials = (a.name || '').slice(0, 2);
        return `
          <a href="/agency.html?slug=${encodeURIComponent(a.slug)}" class="card lift p-5 block">
            <div class="flex items-start gap-3">
              <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 text-white flex items-center justify-center font-extrabold text-base flex-shrink-0">${escapeHtml(initials)}</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1.5 flex-wrap">
                  <h3 class="font-extrabold text-[15px] truncate">${escapeHtml(a.name)}</h3>
                  ${a.is_verified ? '<span class="verified-badge"><i data-lucide="badge-check" class="w-3 h-3"></i>인증</span>' : ''}
                </div>
                <p class="text-[12px] text-black/55 mt-0.5 line-clamp-1">${escapeHtml(a.tagline || '')}</p>
              </div>
            </div>
            <div class="flex items-center gap-1.5 flex-wrap mt-4">
              ${specs.slice(0, 4).map(s => `<span class="chip c-${s}">${SPEC_LABEL[s] || s}</span>`).join('')}
              ${specs.length > 4 ? `<span class="text-[11px] text-black/40">+${specs.length - 4}</span>` : ''}
            </div>
            <div class="flex items-center gap-3 mt-4 pt-4 border-t border-black/5 text-[11px] text-black/55">
              ${a.location ? `<span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i>${escapeHtml(a.location)}</span>` : ''}
              ${a.team_size ? `<span class="flex items-center gap-1"><i data-lucide="users" class="w-3 h-3"></i>${escapeHtml(a.team_size)}인</span>` : ''}
              ${a.founded_year ? `<span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>${a.founded_year}</span>` : ''}
            </div>
          </a>
        `;
      }).join('');

      lucide.createIcons();
    } catch (err) {
      $('#agency-grid').innerHTML = '<div class="md:col-span-2 lg:col-span-3 card p-8 text-center text-rose-500">불러오기 실패</div>';
    }
  }

  let timer;
  $('#q').addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(loadAgencies, 300); });
  $('#specialty').addEventListener('change', loadAgencies);
  $('#size').addEventListener('change', loadAgencies);

  loadAgencies();
</script>
<script src="/ui.js"></script>
</body>
</html>
