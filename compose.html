<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>글쓰기 — 마케톡</title>
<link rel="stylesheet" href="/tailwind.css" />
<script src="/lucide.min.js"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  body { background:#f6f7f9; color:#15171c; }
  .container-x { max-width:880px; margin:0 auto; padding:0 1rem; }
  .card { background-color:#fff; border:1px solid #eaecef; border-radius:12px; }
  input,select,textarea { transition: all .15s; }
  input:focus,select:focus,textarea:focus {
    outline:none; box-shadow:0 0 0 3px rgba(255,62,95,.12); border-color:#ff3e5f;
  }
</style>
</head>
<body class="antialiased">

<header class="bg-white border-b border-black/5 sticky top-0 z-40">
  <div class="container-x flex items-center justify-between h-16">
    <a href="/" class="flex items-center gap-2.5">
      <img src="/logo.svg" alt="마케톡" class="w-9 h-9" />
      <div class="leading-tight">
        <div class="font-extrabold text-lg tracking-tight">마케톡</div>
        <div class="text-[10px] text-black/50">글쓰기</div>
      </div>
    </a>
    <a href="/" class="text-sm text-black/55 hover:text-black inline-flex items-center gap-1">
      <i data-lucide="x" class="w-4 h-4"></i> 취소
    </a>
  </div>
</header>

<main class="container-x mt-6">

  <div id="auth-warn" class="hidden card p-8 text-center mb-6">
    <i data-lucide="lock" class="w-8 h-8 text-black/30 mx-auto mb-3"></i>
    <h2 class="font-extrabold text-lg">로그인이 필요해요</h2>
    <p class="text-sm text-black/55 mt-2">글을 작성하려면 먼저 로그인하세요.</p>
    <a href="/login.html?next=/compose.html" class="mt-5 inline-flex items-center gap-1.5 bg-brand-500 hover:bg-brand-600 text-white rounded-lg px-5 py-2.5 text-sm font-bold">
      로그인 / 회원가입 <i data-lucide="arrow-right" class="w-4 h-4"></i>
    </a>
  </div>

  <form id="form-compose" class="card p-6 hidden">
    <div class="mb-5">
      <label class="text-xs font-bold text-black/60 block mb-1.5">게시판</label>
      <select name="board_slug" required class="w-full h-11 px-3 rounded-lg border border-black/10 text-sm bg-white">
        <option value="">선택...</option>
      </select>
    </div>

    <!-- 구인/협업 전용 구조화 필드 -->
    <div id="job-fields" class="hidden mb-5 p-4 rounded-lg bg-rose-50/40 border border-rose-100">
      <div class="text-xs font-bold text-rose-700 mb-3 flex items-center gap-1.5">
        <i data-lucide="briefcase" class="w-4 h-4"></i>
        구인/협업 정보 (선택, 입력하면 카드로 강조됩니다)
      </div>
      <div class="grid sm:grid-cols-2 gap-3">
        <div>
          <label class="text-[11px] font-bold text-black/55 block mb-1">카테고리</label>
          <select name="job_category" class="w-full h-10 px-3 rounded-md border border-black/10 text-sm bg-white">
            <option value="">선택 안함</option>
            <option value="performance">퍼포먼스 마케팅</option>
            <option value="brand">브랜드 마케팅</option>
            <option value="content">콘텐츠 제작</option>
            <option value="design">디자인</option>
            <option value="seo">SEO</option>
            <option value="sns">SNS 운영</option>
            <option value="data">데이터 분석</option>
            <option value="other">기타</option>
          </select>
        </div>
        <div>
          <label class="text-[11px] font-bold text-black/55 block mb-1">예산</label>
          <input type="text" name="job_budget" maxlength="64" placeholder="월 250만원 / 건당 50만원 / 협의"
                 class="w-full h-10 px-3 rounded-md border border-black/10 text-sm" />
        </div>
        <div>
          <label class="text-[11px] font-bold text-black/55 block mb-1">기간</label>
          <input type="text" name="job_duration" maxlength="64" placeholder="3개월 / 단발성 / 장기"
                 class="w-full h-10 px-3 rounded-md border border-black/10 text-sm" />
        </div>
        <div>
          <label class="text-[11px] font-bold text-black/55 block mb-1">마감일 (선택)</label>
          <input type="date" name="job_deadline"
                 class="w-full h-10 px-3 rounded-md border border-black/10 text-sm" />
        </div>
        <div>
          <label class="text-[11px] font-bold text-black/55 block mb-1">근무지 / 형태</label>
          <input type="text" name="job_location" maxlength="64" placeholder="재택 / 서울 강남 / 하이브리드"
                 class="w-full h-10 px-3 rounded-md border border-black/10 text-sm" />
        </div>
        <div>
          <label class="text-[11px] font-bold text-black/55 block mb-1">연락처 (선택)</label>
          <input type="text" name="job_contact" maxlength="128" placeholder="이메일 또는 카톡 ID"
                 class="w-full h-10 px-3 rounded-md border border-black/10 text-sm" />
        </div>
      </div>
    </div>

    <div class="mb-5">
      <label class="text-xs font-bold text-black/60 block mb-1.5">제목</label>
      <input type="text" name="title" required minlength="4" maxlength="200"
             class="w-full h-12 px-3.5 rounded-lg border border-black/10 text-base font-bold"
             placeholder="제목을 입력하세요" />
    </div>

    <div class="mb-5">
      <label class="text-xs font-bold text-black/60 block mb-1.5">본문</label>
      <textarea name="body" id="body-textarea" required minlength="5" maxlength="8000" rows="14"
                class="w-full px-3.5 py-3 rounded-lg border border-black/10 text-[15px] leading-relaxed resize-y"
                placeholder="본문 내용을 입력하세요. 마케팅 노하우, 질문, 일상 모두 환영합니다."></textarea>
      <div class="flex justify-between text-[11px] text-black/40 mt-1.5">
        <span>일반 텍스트로 작성. 이미지는 아래에서 첨부.</span>
        <span><span id="body-len">0</span> / 8000</span>
      </div>
    </div>

    <!-- 이미지 첨부 영역 -->
    <div class="mb-5">
      <label class="text-xs font-bold text-black/60 block mb-1.5">이미지 첨부 <span class="text-black/40 font-normal">(최대 5장, 장당 5MB)</span></label>
      <div id="drop-zone" class="border-2 border-dashed border-black/15 rounded-xl p-6 text-center cursor-pointer hover:border-brand-500/40 hover:bg-brand-50/30 transition-colors">
        <i data-lucide="image-plus" class="w-8 h-8 mx-auto text-black/25 mb-2"></i>
        <div class="text-sm text-black/50">클릭해서 선택하거나 여기에 드래그</div>
        <div class="text-[11px] text-black/35 mt-1">JPG, PNG, WebP, GIF · 최대 5MB</div>
        <input type="file" id="image-input" multiple accept="image/jpeg,image/png,image/webp,image/gif"
               class="hidden" />
      </div>
      <!-- 미리보기 그리드 -->
      <div id="preview-grid" class="hidden grid grid-cols-5 gap-2 mt-3"></div>
    </div>

    <div id="err" class="hidden text-rose-600 text-sm mb-3"></div>

    <div class="flex items-center justify-between pt-2 border-t border-black/5">
      <span class="text-xs text-black/45">작성자: <b id="author-nickname" class="text-black/70">…</b></span>
      <div class="flex gap-2">
        <a href="/" class="px-5 py-2.5 rounded-lg bg-paper hover:bg-black/5 text-sm font-bold">취소</a>
        <button type="submit" class="px-5 py-2.5 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-bold inline-flex items-center gap-1.5">
          <i data-lucide="send" class="w-4 h-4"></i> 게시
        </button>
      </div>
    </div>
  </form>
</main>

<script>
  lucide.createIcons();
  const $ = (s) => document.querySelector(s);

  async function init() {
    // 로그인 상태 체크
    let me = null;
    try {
      const r = await fetch('/api/auth/me', { credentials:'same-origin' });
      const j = await r.json();
      me = j.user;
    } catch {}

    if (!me) {
      $('#auth-warn').classList.remove('hidden');
      lucide.createIcons();
      return;
    }

    $('#author-nickname').textContent = me.nickname;
    $('#form-compose').classList.remove('hidden');

    // 보드 목록
    const sel = $('select[name="board_slug"]');
    try {
      const r = await fetch('/api/boards');
      const { boards } = await r.json();
      const preferredBoard = new URLSearchParams(location.search).get('board') || '';
      for (const b of boards.filter(b => b.slug !== 'notice')) {
        const opt = document.createElement('option');
        opt.value = b.slug;
        opt.textContent = b.name;
        if (b.slug === preferredBoard) opt.selected = true;
        sel.appendChild(opt);
      }
    } catch {}

    // 보드 변경 시 구인 필드 토글
    function toggleJobFields() {
      if (sel.value === 'job') {
        $('#job-fields').classList.remove('hidden');
        lucide.createIcons();
      } else {
        $('#job-fields').classList.add('hidden');
      }
    }
    sel.addEventListener('change', toggleJobFields);
    toggleJobFields();  // 초기 상태

    // 글자 수 카운터
    const ta = document.querySelector('textarea[name="body"]');
    ta.addEventListener('input', () => {
      $('#body-len').textContent = ta.value.length;
    });

    // ── 이미지 업로드 ──
    const imageFiles = [];
    const dropZone = $('#drop-zone');
    const imageInput = $('#image-input');
    const previewGrid = $('#preview-grid');
    const MAX_IMAGES = 5;
    const MAX_SIZE = 5 * 1024 * 1024;

    dropZone.addEventListener('click', () => imageInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-brand-500','bg-brand-50/30'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('border-brand-500','bg-brand-50/30'); });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('border-brand-500','bg-brand-50/30');
      addFiles(e.dataTransfer.files);
    });
    imageInput.addEventListener('change', (e) => addFiles(e.target.files));

    function addFiles(files) {
      for (const f of files) {
        if (imageFiles.length >= MAX_IMAGES) { mtToast('이미지는 최대 ' + MAX_IMAGES + '장입니다.', 'warn'); break; }
        if (f.size > MAX_SIZE) { mtToast(f.name + ': 5MB를 초과합니다.', 'error'); continue; }
        if (!/^image\/(jpeg|png|webp|gif)$/.test(f.type)) { mtToast(f.name + ': 지원하지 않는 형식입니다.', 'error'); continue; }
        imageFiles.push(f);
      }
      renderPreviews();
    }

    function renderPreviews() {
      if (imageFiles.length === 0) { previewGrid.classList.add('hidden'); return; }
      previewGrid.classList.remove('hidden');
      previewGrid.innerHTML = imageFiles.map((f, i) => `
        <div class="relative group">
          <img src="${URL.createObjectURL(f)}" class="w-full aspect-square object-cover rounded-lg border border-black/10" />
          <button type="button" data-idx="${i}" class="rm-img absolute -top-2 -right-2 w-6 h-6 bg-rose-500 text-white rounded-full text-[12px] font-bold leading-6 hidden group-hover:block">×</button>
          <div class="text-[10px] text-black/40 mt-1 truncate">${f.name}</div>
        </div>
      `).join('');
      previewGrid.querySelectorAll('.rm-img').forEach(btn => {
        btn.addEventListener('click', () => {
          imageFiles.splice(parseInt(btn.dataset.idx), 1);
          renderPreviews();
        });
      });
      // 남은 슬롯 표시
      if (imageFiles.length < MAX_IMAGES) {
        dropZone.querySelector('.text-sm').textContent = `${imageFiles.length}/${MAX_IMAGES}장 선택됨 — 추가하려면 클릭`;
      } else {
        dropZone.querySelector('.text-sm').textContent = `${MAX_IMAGES}장 선택 완료`;
      }
    }

    // ── 제출 (FormData로 이미지 포함) ──
    $('#form-compose').addEventListener('submit', async (e) => {
      e.preventDefault();
      $('#err').classList.add('hidden');

      const formData = new FormData();
      formData.append('board_slug', e.target.board_slug.value);
      formData.append('title', e.target.title.value);
      formData.append('body', e.target.body.value);

      // 구인/협업 metadata
      if (e.target.board_slug.value === 'job') {
        const meta = {
          category: e.target.job_category?.value || '',
          budget:   e.target.job_budget?.value   || '',
          duration: e.target.job_duration?.value  || '',
          deadline: e.target.job_deadline?.value  || '',
          location: e.target.job_location?.value  || '',
          contact:  e.target.job_contact?.value   || '',
        };
        if (Object.values(meta).some(v => v && v.trim().length > 0)) {
          formData.append('metadata', JSON.stringify(meta));
        }
      }

      // 이미지 파일들
      imageFiles.forEach(f => formData.append('images', f));

      try {
        const r = await fetch('/api/posts', {
          method:'POST',
          credentials:'same-origin',
          body: formData,  // Content-Type 자동 설정
        });
        const j = await r.json();
        if (!r.ok) {
          $('#err').textContent = j.message || `오류: ${j.error}`;
          $('#err').classList.remove('hidden');
          return;
        }
        location.href = `/post.html?id=${j.post.id}`;
      } catch {
        $('#err').textContent = '네트워크 오류';
        $('#err').classList.remove('hidden');
      }
    });
  }

  init();
</script>
<script src="/ui.js"></script>
</body>
</html>
