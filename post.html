<script>
  const fmt = new Intl.NumberFormat('ko-KR');
  const $ = (s) => document.querySelector(s);
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function timeAgo(iso) {
    const diff = Math.max(0, Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60)      return '방금 전';
    if (diff < 3600)    return Math.floor(diff/60) + '분 전';
    if (diff < 86400)   return Math.floor(diff/3600) + '시간 전';
    if (diff < 86400*7) return Math.floor(diff/86400) + '일 전';
    return new Date(iso).toLocaleString('ko-KR');
  }
  function avatarClass(nickname) {
    let h = 0;
    for (const c of nickname) h = (h * 31 + c.charCodeAt(0)) >>> 0;
    return 'av-' + ((h % 10) + 1);
  }
  async function fetchJson(url, opts) {
    const r = await fetch(url, opts);
    if (!r.ok) throw new Error('fetch failed: ' + url);
    return r.json();
  }

  // ───── 게시글 로드 ─────
  const postId = new URLSearchParams(location.search).get('id');
  let currentUserId = null;
  let currentUserRole = null;
  if (!postId) {
    document.body.innerHTML = '<div class="container-x py-32 text-center"><p class="text-lg">잘못된 접근입니다.</p><a href="/" class="mt-4 inline-block text-brand-500 underline">목록으로</a></div>';
    throw new Error('no id');
  }

  async function loadPost() {
    try {
      const { post, comments, images } = await fetchJson('/api/posts/' + postId);
      document.title = `${post.title} — 마케톡`;

      // 게시판 뱃지
      const link = $('#post-board-link');
      link.href = `/?board=${post.board_slug}`;
      link.textContent = post.board_name;
      link.className = `badge-cat ${post.badge_class || 'b-free'}`;

      // 본문
      $('#post-title').textContent = post.title;
      // 본문 렌더: HTML 이스케이프 후 URL을 클릭 가능한 링크로 변환
      const bodyHtml = escapeHtml(post.body)
        .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" class="text-brand-500 hover:underline break-all">$1</a>');
      $('#post-body').innerHTML = bodyHtml;

      // 이미지 렌더링
      if (images && images.length > 0) {
        const imgHtml = `
          <div class="mt-6 grid ${images.length === 1 ? '' : images.length === 2 ? 'grid-cols-2' : 'grid-cols-3'} gap-2">
            ${images.map(img => `
              <a href="${img.url}" target="_blank" class="block">
                <img src="${img.url}" alt="${escapeHtml(img.file_name || '')}" loading="lazy"
                     class="w-full ${images.length === 1 ? 'max-h-[500px] object-contain' : 'aspect-square object-cover'} rounded-lg border border-black/5" />
              </a>
            `).join('')}
          </div>`;
        $('#post-body').insertAdjacentHTML('afterend', imgHtml);
      }

      $('#post-author').textContent = post.author_nickname;

      // 구인/협업 metadata 카드
      if (post.metadata && Object.values(post.metadata).some(v => v && String(v).trim())) {
        const m = post.metadata;

  function renderComments(comments) {
    $('#cmt-count').textContent = comments.length;
    const list = $('#cmt-list');
    if (comments.length === 0) {
      list.innerHTML = '<div class="px-6 py-12 text-center text-sm text-black/40">아직 댓글이 없습니다. 가장 먼저 댓글을 남겨보세요.</div>';
      return;
    }
    // 대댓글 트리 구성
    const topLevel = comments.filter(c => !c.parent_id);
    const replies = {};
    comments.forEach(c => {
      if (c.parent_id) {
        if (!replies[c.parent_id]) replies[c.parent_id] = [];
        replies[c.parent_id].push(c);
      }
    });

    function renderComment(c, isReply = false) {
      const indent = isReply ? 'ml-10 border-l-2 border-black/5 pl-4' : '';
      const childReplies = replies[c.id] || [];
      return `
      <div class="px-6 py-4 hover:bg-black/[0.015] ${indent}">
        <div class="flex items-start gap-3">
          <div class="av av-sm ${avatarClass(c.author_nickname)}">${escapeHtml(c.author_nickname[0])}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 text-[12px]">
              <span class="font-semibold">${escapeHtml(c.author_nickname)}</span>
              <span class="text-black/40">·</span>
              <span class="text-black/40">${timeAgo(c.created_at)}</span>
            </div>
            <div class="mt-1.5 text-[14px] leading-relaxed text-black/85 whitespace-pre-wrap">${escapeHtml(c.body)}</div>
            <div class="mt-2 flex items-center gap-3 text-[11px] text-black/40">
              <button class="cmt-like-btn hover:text-rose-500 inline-flex items-center gap-1 ${myCommentLikes.includes(parseInt(c.id)) ? 'text-rose-500' : ''}" data-cid="${c.id}">
                <i data-lucide="heart" class="w-3 h-3"></i> <span>${c.like_count || 0}</span>
              </button>
              <button class="reply-btn hover:text-brand-500" data-cid="${c.id}" data-nick="${escapeHtml(c.author_nickname)}">답글</button>
              ${c.user_id && currentUserId && (parseInt(c.user_id) === currentUserId || currentUserRole === 'admin') ? `
                <button class="cmt-edit-btn hover:text-brand-500" data-cid="${c.id}">수정</button>
                <button class="cmt-del-btn hover:text-rose-500" data-cid="${c.id}">삭제</button>
              ` : ''}
            </div>
            <!-- 답글 입력 (숨김) -->
            <div class="reply-form hidden mt-3" id="reply-form-${c.id}">
              <div class="flex gap-2">
                <input type="text" placeholder="@${escapeHtml(c.author_nickname)}에게 답글..." maxlength="500"
                       class="reply-input flex-1 h-9 px-3 rounded-md bg-paper border border-black/10 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/20" />
                <button class="reply-submit h-9 px-3 bg-brand-500 hover:bg-brand-600 text-white rounded-md text-[12px] font-bold" data-pid="${c.id}">등록</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      ${childReplies.map(r => renderComment(r, true)).join('')}`;
    }

    list.innerHTML = topLevel.map(c => renderComment(c)).join('');
    lucide.createIcons();

    // 댓글 좋아요 이벤트
    list.querySelectorAll('.cmt-like-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const cid = btn.dataset.cid;
        const resp = await fetch(`/api/posts/${postId}/comments/${cid}/like`, { method:'POST', credentials:'same-origin' });
        if (resp.status === 401) { location.href = '/login.html?next=' + encodeURIComponent(location.href); return; }
        const { liked } = await resp.json();
        const span = btn.querySelector('span');
        span.textContent = parseInt(span.textContent) + (liked ? 1 : -1);
        btn.classList.toggle('text-rose-500', liked);
      });
    });

    // 답글 토글
    list.querySelectorAll('.reply-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const form = document.getElementById('reply-form-' + btn.dataset.cid);
        if (form) {
          form.classList.toggle('hidden');
          if (!form.classList.contains('hidden')) form.querySelector('input')?.focus();
        }
      });
    });

    // 댓글 수정
    list.querySelectorAll('.cmt-edit-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const cid = btn.dataset.cid;
        const bodyEl = btn.closest('.flex-1').querySelector('.whitespace-pre-wrap');
        if (!bodyEl) return;
        const original = bodyEl.textContent;
        bodyEl.innerHTML = `
          <textarea class="cmt-edit-ta w-full px-2 py-1.5 rounded border border-black/15 text-[13px] resize-y" rows="3">${escapeHtml(original)}</textarea>
          <div class="flex gap-1.5 mt-1.5">
            <button class="cmt-edit-save px-3 py-1 bg-brand-500 text-white rounded text-[11px] font-bold" data-cid="${cid}">저장</button>
            <button class="cmt-edit-cancel px-3 py-1 bg-paper rounded text-[11px] font-bold">취소</button>
          </div>`;
        bodyEl.querySelector('.cmt-edit-cancel').addEventListener('click', () => {
          bodyEl.textContent = original;
        });
        bodyEl.querySelector('.cmt-edit-save').addEventListener('click', async () => {
          const newBody = bodyEl.querySelector('.cmt-edit-ta').value.trim();
          if (newBody.length < 2) return;
          const r = await fetch(`/api/posts/${postId}/comments/${cid}`, {
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            credentials:'same-origin',
            body: JSON.stringify({ body: newBody }),
          });
          if (r.ok) loadPost();
          else alert('수정 실패');
        });
      });
    });

    // 댓글 삭제
    list.querySelectorAll('.cmt-del-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const ok2 = await mtConfirm('이 댓글을 삭제하시겠습니까?', { title: '댓글 삭제', okText: '삭제', danger: true }); if (!ok2) return;
        const r = await fetch(`/api/posts/${postId}/comments/${btn.dataset.cid}`, {
          method:'DELETE', credentials:'same-origin',
        });
        if (r.ok) loadPost();
        else alert('삭제 실패');
      });
    });

    // 답글 제출
    list.querySelectorAll('.reply-submit').forEach(btn => {
      btn.addEventListener('click', async () => {
        const parentId = btn.dataset.pid;
        const input = btn.previousElementSibling;
        const body = input?.value?.trim();
        if (!body || body.length < 2) return;

        const resp = await fetch(`/api/posts/${postId}/comments`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          credentials:'same-origin',
          body: JSON.stringify({ body, parent_id: parseInt(parentId) }),
        });
        if (resp.status === 401) { location.href = '/login.html?next=' + encodeURIComponent(location.href); return; }
        if (resp.ok) {
          input.value = '';
          loadPost(); // 다시 로드
        }
      });
    });
  }

  (() => {
    const form = document.getElementById('hdr-search');
    const inp = document.getElementById('hdr-q');
    const drop = document.getElementById('search-suggest');
    if (!form || !inp || !drop) return;
    let timer, activeIdx = -1;

    function highlight(text, q) {
      const esc = escapeHtml(text || '');
      if (!q) return esc;
      const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      return esc.replace(re, m => `<mark>${m}</mark>`);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const v = inp.value.trim();
      if (v.length >= 2) location.href = '/search.html?q=' + encodeURIComponent(v);
    });

    inp.addEventListener('input', () => {
      clearTimeout(timer);
      const v = inp.value.trim();
      if (v.length < 2) { drop.classList.add('hidden'); return; }
      timer = setTimeout(async () => {
        try {
          const r = await fetch('/api/search/suggest?q=' + encodeURIComponent(v));
          const { suggestions } = await r.json();
          if (!suggestions || suggestions.length === 0) { drop.classList.add('hidden'); return; }
          drop.innerHTML = `
            ${suggestions.map((s, i) => `
              <a href="/post.html?id=${s.id}" data-i="${i}" class="suggest-item flex items-center gap-2 px-4 py-2.5 hover:bg-paper text-sm border-b border-black/5 last:border-b-0">
                <span class="text-[10px] font-bold text-brand-500 px-1.5 py-0.5 bg-brand-50 rounded">${escapeHtml(s.board_name)}</span>
                <span class="flex-1 truncate">${highlight(s.title, v)}</span>
              </a>
            `).join('')}
            <a href="/search.html?q=${encodeURIComponent(v)}" class="block px-4 py-2.5 text-center text-[12px] font-bold text-brand-500 hover:bg-brand-50 bg-paper">"${escapeHtml(v)}" 전체 검색 결과 →</a>
          `;
          drop.classList.remove('hidden');
          activeIdx = -1;
        } catch {}
      }, 200);
    });

    inp.addEventListener('keydown', (e) => {
      const items = drop.querySelectorAll('.suggest-item');
      if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, items.length - 1); items.forEach((it, i) => it.classList.toggle('bg-paper', i === activeIdx)); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, -1); items.forEach((it, i) => it.classList.toggle('bg-paper', i === activeIdx)); }
      else if (e.key === 'Enter' && activeIdx >= 0 && items[activeIdx]) { e.preventDefault(); location.href = items[activeIdx].href; }
      else if (e.key === 'Escape') drop.classList.add('hidden');
    });

    document.addEventListener('click', (e) => {
      if (!form.contains(e.target)) drop.classList.add('hidden');
    });
  })();

        <div class="promo-title" style="font-size:15px;margin-top:12px">디스코드 커뮤니티</div>
        <div class="promo-desc" style="margin-top:6px">실시간 마케터 수다 + 새 글 알림</div>
        <div class="promo-cta" style="margin-top:14px">참여하기 →</div></a>`,
    },
    bottom: {
      html: `<a href="/agencies.html" class="promo-banner" style="background:linear-gradient(135deg,#059669,#047857)">
        <div class="promo-icon">🏢</div>
        <div class="promo-text"><div class="promo-title">광고대행사 디렉토리</div><div class="promo-desc">검증된 마케팅 대행사를 한곳에서</div></div>
        <div class="promo-cta">둘러보기 →</div></a>`,
    },
  };

  async function loadBanners() {
    let dbBanners = {}, envAds = {};
    try { dbBanners = (await (await fetch('/api/banners')).json()).banners || {}; } catch {}
    try {
      envAds = (await (await fetch('/api/ads')).json()) || {};
      if (envAds.head && !document.getElementById('ad-head')) {
        const s = document.createElement('div'); s.id='ad-head'; s.innerHTML = envAds.head;
        document.head.appendChild(s);
      }
    } catch {}

    document.querySelectorAll('[data-ad-slot]').forEach(el => {
      const key = el.dataset.adSlot;
      const list = dbBanners[key] || [];
      if (list.length > 0) renderCarousel(el, list);
      else if (envAds[key]) { el.innerHTML = envAds[key]; el.classList.remove('ad-slot'); }
      else if (PROMO_BANNERS[key]) {
        el.innerHTML = PROMO_BANNERS[key].html;
        el.classList.remove('ad-slot');
        el.style.background = 'none';
        el.style.border = 'none';
      }
    });
  }

  function renderCarousel(el, banners) {
    el.classList.remove('ad-slot');
    el.classList.add('banner-carousel');
    el.innerHTML = banners.map((b, i) => {
      const inner = `<img src="${b.image_url}" alt="${escapeHtml(b.alt_text || '')}" loading="lazy" />`;
      const cls = i === 0 ? 'active' : '';
      if (b.link_url) return `<a href="${b.link_url}" target="_blank" rel="noopener sponsored" class="${cls}" data-bid="${b.id}">${inner}</a>`;
      return `<div class="banner-slide ${cls}">${inner}</div>`;
    }).join('') + (banners.length > 1
      ? `<div class="banner-dots">${banners.map((_,i)=>`<span class="${i===0?'active':''}"></span>`).join('')}</div>`
      : '');
    el.querySelectorAll('a[data-bid]').forEach(a => {
      a.addEventListener('click', () => {
        fetch('/api/banners/' + a.dataset.bid + '/click', { method:'POST' }).catch(()=>{});
      });
    });
    if (banners.length > 1) {
      let idx = 0, paused = false;
      const slides = el.querySelectorAll('a, .banner-slide');
      const dots = el.querySelectorAll('.banner-dots span');
      el.addEventListener('mouseenter', () => paused = true);
      el.addEventListener('mouseleave', () => paused = false);
      setInterval(() => {
        if (paused) return;
        slides[idx].classList.remove('active');
        dots[idx]?.classList.remove('active');
        idx = (idx + 1) % slides.length;
        slides[idx].classList.add('active');
        dots[idx]?.classList.add('active');
      }, 5000);
    }
  }

  // ───── INIT ─────
  lucide.createIcons();
  loadAuth();
  loadPost();
  loadHot();
  loadStats();
  loadBanners();
</script>
<script src="/ui.js"></script>
</body>
