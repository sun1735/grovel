<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로그인 — 마케톡</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: { sans: ['Pretendard Variable','Pretendard','system-ui','sans-serif'] },
      colors: { paper:'#f6f7f9', ink:'#15171c', brand:{50:'#fff1f3',500:'#ff3e5f',600:'#ed1f43',700:'#c41635'} }
    }}
  }
</script>
<style>
  body { background:#f6f7f9; color:#15171c; }
  .card { background:#fff; border:1px solid #eaecef; border-radius:16px; }
  input { transition: all .15s; }
  input:focus { outline:none; box-shadow: 0 0 0 3px rgba(255,62,95,.12); border-color:#ff3e5f; }
  .err { color:#dc2626; font-size:12px; margin-top:6px; }
</style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">

    <div class="text-center mb-6">
      <a href="/" class="inline-flex items-center gap-2.5">
        <div class="w-10 h-10 rounded-xl bg-brand-500 flex items-center justify-center">
          <i data-lucide="message-square-text" class="w-5 h-5 text-white"></i>
        </div>
        <span class="font-extrabold text-xl tracking-tight">마케톡</span>
      </a>
      <div class="text-[11px] text-black/50 mt-1">MarkeTalk Community</div>
    </div>

    <!-- 탭 -->
    <div class="flex gap-1 mb-4 bg-paper rounded-xl p-1">
      <button id="tab-login"    class="flex-1 h-10 rounded-lg text-sm font-bold bg-white shadow-sm">로그인</button>
      <button id="tab-register" class="flex-1 h-10 rounded-lg text-sm font-bold text-black/55 hover:text-black">회원가입</button>
    </div>

    <!-- 카카오 간편 가입/로그인 -->
    <div class="card p-5 mb-4">
      <a href="/api/auth/kakao" class="flex items-center justify-center gap-2 w-full h-12 rounded-xl font-bold text-[15px]" style="background:#FEE500;color:#191919">
        <svg width="20" height="20" viewBox="0 0 20 20"><path fill="#191919" d="M10 1C5.03 1 1 4.17 1 8.09c0 2.54 1.66 4.77 4.17 6.05l-1.06 3.88c-.09.34.28.61.58.43l4.5-2.96c.27.03.54.04.81.04 4.97 0 9-3.17 9-7.09S14.97 1 10 1"/></svg>
        카카오로 간편 가입/로그인
      </a>
      <p class="text-[11px] text-black/45 text-center mt-2">카카오 계정으로 3초 만에 시작할 수 있어요</p>
    </div>

    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 h-px bg-black/10"></div>
      <span class="text-[11px] text-black/40">또는 이메일로</span>
      <div class="flex-1 h-px bg-black/10"></div>
    </div>

    <!-- 로그인 폼 -->
    <form id="form-login" class="card p-6 space-y-3">
      <div>
        <label class="text-xs font-bold text-black/60 block mb-1.5">이메일</label>
        <input type="email" name="email" required autocomplete="email"
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm" placeholder="you@example.com" />
      </div>
      <div>
        <label class="text-xs font-bold text-black/60 block mb-1.5">비밀번호</label>
        <input type="password" name="password" required autocomplete="current-password"
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm" placeholder="••••••••" />
      </div>
      <div id="err-login" class="err hidden"></div>
      <button type="submit" class="w-full h-11 bg-ink text-white rounded-lg text-sm font-bold hover:bg-black/85">
        로그인
      </button>
    </form>

    <!-- 회원가입 폼 -->
    <form id="form-register" class="card p-6 space-y-3 hidden">
      <div>
        <label class="text-xs font-bold text-black/60 block mb-1.5">이메일</label>
        <input type="email" name="email" required
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm" placeholder="you@example.com" />
      </div>
      <div>
        <label class="text-xs font-bold text-black/60 block mb-1.5">닉네임 <span class="text-black/40 font-normal">(2-20자)</span></label>
        <input type="text" name="nickname" required minlength="2" maxlength="20"
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm" placeholder="마케터김" />
      </div>
      <div>
        <label class="text-xs font-bold text-black/60 block mb-1.5">비밀번호 <span class="text-black/40 font-normal">(8자 이상)</span></label>
        <input type="password" name="password" required minlength="8" autocomplete="new-password"
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm" placeholder="••••••••" />
      </div>
      <div id="err-register" class="err hidden"></div>
      <button type="submit" class="w-full h-11 bg-brand-500 text-white rounded-lg text-sm font-bold hover:bg-brand-600">
        회원가입 후 시작
      </button>
      <p class="text-[11px] text-black/45 text-center pt-1">
        가입 시 마케톡 <a href="/terms.html" class="underline">이용약관</a>과 <a href="/privacy.html" class="underline">개인정보처리방침</a>에 동의합니다.
      </p>
    </form>

    <div class="text-center mt-6 space-y-2">
      <a href="/forgot-password.html" class="block text-xs text-brand-500 hover:text-brand-600 font-semibold">
        아이디/비밀번호를 잊으셨나요?
      </a>
      <a href="/" class="block text-xs text-black/50 hover:text-black inline-flex items-center gap-1 mx-auto">
        <i data-lucide="arrow-left" class="w-3 h-3"></i> 메인으로
      </a>
    </div>

  </div>

<script>
  lucide.createIcons();
  const $ = (s) => document.querySelector(s);

  // 탭 전환
  const tabLogin    = $('#tab-login');
  const tabRegister = $('#tab-register');
  const formLogin    = $('#form-login');
  const formRegister = $('#form-register');

  function switchTab(target) {
    if (target === 'login') {
      tabLogin.classList.add('bg-white','shadow-sm'); tabLogin.classList.remove('text-black/55');
      tabRegister.classList.remove('bg-white','shadow-sm'); tabRegister.classList.add('text-black/55');
      formLogin.classList.remove('hidden'); formRegister.classList.add('hidden');
    } else {
      tabRegister.classList.add('bg-white','shadow-sm'); tabRegister.classList.remove('text-black/55');
      tabLogin.classList.remove('bg-white','shadow-sm'); tabLogin.classList.add('text-black/55');
      formRegister.classList.remove('hidden'); formLogin.classList.add('hidden');
    }
  }
  tabLogin.addEventListener('click', () => switchTab('login'));
  tabRegister.addEventListener('click', () => switchTab('register'));

  if (location.hash === '#register') switchTab('register');

  function showErr(id, msg) {
    const el = $('#' + id);
    el.textContent = msg;
    el.classList.remove('hidden');
  }
  function clearErr(id) { $('#' + id).classList.add('hidden'); }

  // 로그인
  formLogin.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErr('err-login');
    const data = Object.fromEntries(new FormData(formLogin));
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify(data),
        credentials: 'same-origin',
      });
      const json = await r.json();
      if (!r.ok) {
        showErr('err-login', json.message || '이메일 또는 비밀번호가 잘못됐습니다.');
        return;
      }
      const next = new URLSearchParams(location.search).get('next') || '/';
      location.href = next;
    } catch (err) {
      showErr('err-login', '네트워크 오류');
    }
  });

  // 회원가입
  formRegister.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErr('err-register');
    const data = Object.fromEntries(new FormData(formRegister));
    try {
      const r = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify(data),
        credentials: 'same-origin',
      });
      const json = await r.json();
      if (!r.ok) {
        showErr('err-register', json.message || `오류: ${json.error}`);
        return;
      }
      location.href = '/';
    } catch (err) {
      showErr('err-register', '네트워크 오류');
    }
  });
</script>
<script src="/ui.js"></script>
</body>
</html>
