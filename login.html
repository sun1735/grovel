<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로그인 — 마케톡</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<meta name="description" content="마케톡에 로그인하거나 회원가입하세요. 카카오 간편 로그인 지원." />
<link rel="stylesheet" href="/tailwind.css" />
<script src="/lucide.min.js"></script>
<style>
  body {
    background:#f6f7f9; color:#15171c;
    font-feature-settings:"ss01","cv11";
    -webkit-font-smoothing:antialiased;
  }
  .card {
    background-color:#fff;
    border:1px solid rgba(0,0,0,0.05);
    border-radius:16px;
    box-shadow:0 1px 2px rgba(15,23,42,0.03);
  }
  .fld {
    width:100%; height:44px; padding:0 14px;
    border-radius:12px; border:1px solid rgba(0,0,0,0.1);
    background:#f6f7f9; font-size:14px;
    transition: box-shadow .15s, border-color .15s, background .15s;
  }
  .fld:hover { background:#fff; }
  .fld:focus {
    outline:none; background:#fff;
    border-color:#ff3e5f;
    box-shadow:0 0 0 3px rgba(255,62,95,.15);
  }
  .err { color:#dc2626; font-size:12px; margin-top:6px; font-weight:500; }
  .tab-btn {
    flex:1; height:40px; border-radius:10px;
    font-size:13px; font-weight:700;
    transition: background .15s, color .15s, box-shadow .15s;
  }
  .tab-btn.active { background:#fff; box-shadow:0 1px 2px rgba(15,23,42,0.05); color:#15171c; }
  .tab-btn:not(.active) { color:rgba(0,0,0,0.55); }
  .tab-btn:not(.active):hover { color:#15171c; }
</style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center px-4 py-10">

  <div class="w-full max-w-sm">

    <!-- 로고 + 카피 -->
    <div class="text-center mb-7">
      <a href="/" class="inline-flex items-center justify-center gap-2">
        <img src="/logo.svg" alt="마케톡" class="w-10 h-10" />
        <span class="font-black tracking-tight text-[22px] leading-none">마케톡</span>
      </a>
      <p class="text-[12.5px] text-black/55 mt-3 leading-relaxed">
        마케터들의 가장 솔직한 익명 커뮤니티<br/>
        <span class="text-black/40">MarkeTalk Community</span>
      </p>
    </div>

    <!-- 탭 -->
    <div class="flex gap-1 mb-4 bg-paper rounded-xl p-1 border border-black/5">
      <button id="tab-login"    class="tab-btn active">로그인</button>
      <button id="tab-register" class="tab-btn">회원가입</button>
    </div>

    <!-- 카카오 간편 가입/로그인 -->
    <div class="card p-5 mb-4">
      <a href="/api/auth/kakao" class="flex items-center justify-center gap-2 w-full h-12 rounded-xl font-bold text-[14.5px] hover:opacity-95 transition" style="background:#FEE500;color:#191919">
        <svg width="18" height="18" viewBox="0 0 20 20"><path fill="#191919" d="M10 1C5.03 1 1 4.17 1 8.09c0 2.54 1.66 4.77 4.17 6.05l-1.06 3.88c-.09.34.28.61.58.43l4.5-2.96c.27.03.54.04.81.04 4.97 0 9-3.17 9-7.09S14.97 1 10 1"/></svg>
        카카오로 3초 만에 시작
      </a>
      <p class="text-[11px] text-black/45 text-center mt-2.5 font-medium">가장 빠른 로그인 방법이에요</p>
    </div>

    <!-- 구분선 -->
    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 h-px bg-black/10"></div>
      <span class="text-[11px] text-black/45 font-semibold tracking-wide">또는 이메일로</span>
      <div class="flex-1 h-px bg-black/10"></div>
    </div>

    <!-- 로그인 폼 -->
    <form id="form-login" class="card p-6 space-y-3.5">
      <div>
        <label class="text-[12px] font-bold text-black/60 block mb-1.5">이메일</label>
        <input type="email" name="email" required autocomplete="email"
               class="fld" placeholder="you@example.com" />
      </div>
      <div>
        <label class="text-[12px] font-bold text-black/60 block mb-1.5">비밀번호</label>
        <input type="password" name="password" required autocomplete="current-password"
               class="fld" placeholder="••••••••" />
      </div>
      <div id="err-login" class="err hidden"></div>
      <button type="submit" class="w-full h-12 bg-ink text-white rounded-xl text-[14.5px] font-bold hover:bg-black/85 transition">
        로그인
      </button>
    </form>

    <!-- 회원가입 폼 -->
    <form id="form-register" class="card p-6 space-y-3.5 hidden">
      <div>
        <label class="text-[12px] font-bold text-black/60 block mb-1.5">이메일</label>
        <input type="email" name="email" required
               class="fld" placeholder="you@example.com" />
      </div>
      <div>
        <label class="text-[12px] font-bold text-black/60 block mb-1.5">
          닉네임 <span class="text-black/40 font-medium">(2-20자)</span>
        </label>
        <input type="text" name="nickname" required minlength="2" maxlength="20"
               class="fld" placeholder="마케터김" />
      </div>
      <div>
        <label class="text-[12px] font-bold text-black/60 block mb-1.5">
          비밀번호 <span class="text-black/40 font-medium">(8자 이상, 영문·숫자·특수문자 중 2종 이상)</span>
        </label>
        <input type="password" name="password" required minlength="8" autocomplete="new-password"
               class="fld" placeholder="••••••••" />
      </div>
      <div id="err-register" class="err hidden"></div>
      <button type="submit" class="w-full h-12 bg-brand-500 text-white rounded-xl text-[14.5px] font-bold hover:bg-brand-600 transition">
        회원가입 후 시작하기
      </button>
      <p class="text-[11px] text-black/45 text-center leading-relaxed pt-0.5">
        가입 시 마케톡 <a href="/terms.html" class="underline hover:text-black/70">이용약관</a>과
        <a href="/privacy.html" class="underline hover:text-black/70">개인정보처리방침</a>에 동의합니다.
      </p>
    </form>

    <!-- 하단 링크 -->
    <div class="text-center mt-6 space-y-2.5">
      <a href="/forgot-password.html" class="block text-[12px] text-brand-500 hover:text-brand-600 font-semibold">
        아이디/비밀번호를 잊으셨나요?
      </a>
      <a href="/" class="inline-flex items-center gap-1 text-[12px] text-black/50 hover:text-black font-medium">
        <i data-lucide="arrow-left" class="w-3 h-3"></i> 메인으로
      </a>
    </div>

  </div>

<script>
  lucide.createIcons();
  const $ = (s) => document.querySelector(s);

  const tabLogin    = $('#tab-login');
  const tabRegister = $('#tab-register');
  const formLogin    = $('#form-login');
  const formRegister = $('#form-register');

  function switchTab(target) {
    if (target === 'login') {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      formLogin.classList.remove('hidden');
      formRegister.classList.add('hidden');
    } else {
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      formRegister.classList.remove('hidden');
      formLogin.classList.add('hidden');
    }
  }
  tabLogin.addEventListener('click', () => switchTab('login'));
  tabRegister.addEventListener('click', () => switchTab('register'));

  if (location.hash === '#register') switchTab('register');

  function showErr(id, msg) {
    const el = $('#' + id);
    el.textContent = msg;
    el.classList.remove('hidden');
  }
  function clearErr(id) { $('#' + id).classList.add('hidden'); }

  formLogin.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErr('err-login');
    const data = Object.fromEntries(new FormData(formLogin));
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify(data),
        credentials: 'same-origin',
      });
      const json = await r.json();
      if (!r.ok) {
        showErr('err-login', json.message || '이메일 또는 비밀번호가 잘못됐습니다.');
        return;
      }
      const next = new URLSearchParams(location.search).get('next') || '/';
      location.href = next;
    } catch (err) {
      showErr('err-login', '네트워크 오류');
    }
  });

  formRegister.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErr('err-register');
    const data = Object.fromEntries(new FormData(formRegister));
    try {
      const r = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify(data),
        credentials: 'same-origin',
      });
      const json = await r.json();
      if (!r.ok) {
        showErr('err-register', json.message || `오류: ${json.error}`);
        return;
      }
      location.href = '/';
    } catch (err) {
      showErr('err-register', '네트워크 오류');
    }
  });
</script>
<script src="/ui.js"></script>
</body>
</html>
