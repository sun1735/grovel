<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>마케팅 자료실 — 마케톡</title>
<meta name="description" content="다운로드해서 바로 쓰는 마케팅 자료. 카피 템플릿·체크리스트·치트시트·워크북·용어사전." />
<link rel="stylesheet" href="/tailwind.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  body { background:#f6f7f9; color:#15171c; }
  .container-x { max-width:1240px; margin:0 auto; padding:0 1rem; }
  .card { background:#fff; border:1px solid #eaecef; border-radius:14px; }
  .lift { transition:all .2s; }
  .lift:hover { transform:translateY(-3px); box-shadow:0 12px 32px -16px rgba(0,0,0,.18); border-color:#d1d5db; }
  .cover { aspect-ratio: 16/9; border-radius:12px; position:relative; overflow:hidden; }
  .cover::before { content:''; position:absolute; inset:0; background-image:radial-gradient(circle at 30% 20%, rgba(255,255,255,.25), transparent 50%); }
  .cat-pill { display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:700; }
  .cat-copy-pack  { background:#ffe4e6; color:#be123c; }
  .cat-checklist  { background:#dcfce7; color:#15803d; }
  .cat-cheatsheet { background:#dbeafe; color:#1d4ed8; }
  .cat-workbook   { background:#f3e8ff; color:#7e22ce; }
  .cat-glossary   { background:#cffafe; color:#0e7490; }
</style>
</head>
<body class="antialiased">

<div class="bg-ink text-white text-xs">
  <div class="container-x flex items-center justify-between h-9">
    <a href="/" class="text-white/80 hover:text-white">← 마케톡 메인</a>
    <div class="flex items-center gap-3 text-white/70">
      <a href="/login.html" class="hover:text-white">로그인</a>
      <span class="text-white/30">|</span>
      <a href="/login.html#register" class="hover:text-white">회원가입</a>
    </div>
  </div>
</div>

<header class="bg-white border-b border-black/5">
  <div class="container-x flex items-center gap-4 h-16">
    <a href="/" class="flex items-center gap-2.5">
      <img src="/logo.svg" alt="마케톡" class="w-9 h-9" />
      <div class="leading-tight">
        <div class="font-extrabold text-lg tracking-tight">마케톡</div>
        <div class="text-[10px] text-black/50">마케팅 자료실</div>
      </div>
    </a>
    <div class="flex-1"></div>
    <a href="/copy-generator.html" class="hidden md:inline-flex items-center gap-1.5 px-3.5 h-9 bg-brand-500 hover:bg-brand-600 text-white rounded-lg text-sm font-bold">
      <i data-lucide="sparkles" class="w-3.5 h-3.5"></i> 카피 생성기
    </a>
  </div>
</header>

<main class="container-x my-8 space-y-6">

  <div class="text-center max-w-2xl mx-auto py-6">
    <div class="inline-flex items-center gap-2 bg-brand-50 text-brand-700 px-3 py-1 rounded-full text-[12px] font-bold mb-3">
      <i data-lucide="library" class="w-3.5 h-3.5"></i>
      RESOURCES
    </div>
    <h1 class="text-3xl md:text-4xl font-black tracking-tight">바로 쓰는 마케팅 자료</h1>
    <p class="text-sm text-black/55 mt-3">카피 템플릿, 체크리스트, 치트시트, 워크북 — 회원가입 없이 무료로 보세요.</p>
  </div>

  <!-- 카테고리 탭 -->
  <div class="flex flex-wrap items-center gap-2 justify-center">
    <button data-cat="all"        class="cat-tab px-4 h-9 rounded-full bg-ink text-white text-[13px] font-bold">전체</button>
    <button data-cat="copy-pack"  class="cat-tab px-4 h-9 rounded-full bg-white border border-black/10 hover:border-brand-500 text-[13px] font-bold">📝 카피 템플릿</button>
    <button data-cat="checklist"  class="cat-tab px-4 h-9 rounded-full bg-white border border-black/10 hover:border-brand-500 text-[13px] font-bold">✅ 체크리스트</button>
    <button data-cat="cheatsheet" class="cat-tab px-4 h-9 rounded-full bg-white border border-black/10 hover:border-brand-500 text-[13px] font-bold">📊 치트시트</button>
    <button data-cat="workbook"   class="cat-tab px-4 h-9 rounded-full bg-white border border-black/10 hover:border-brand-500 text-[13px] font-bold">📖 워크북</button>
    <button data-cat="glossary"   class="cat-tab px-4 h-9 rounded-full bg-white border border-black/10 hover:border-brand-500 text-[13px] font-bold">🔤 용어사전</button>
  </div>

  <div id="result-meta" class="text-sm text-black/55 text-center"></div>

  <!-- 그리드 -->
  <div id="resource-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
    <div class="card p-6 animate-pulse"><div class="cover bg-paper mb-4"></div><div class="h-5 bg-black/5 rounded w-2/3 mb-2"></div><div class="h-3 bg-black/5 rounded w-full"></div></div>
    <div class="card p-6 animate-pulse"><div class="cover bg-paper mb-4"></div><div class="h-5 bg-black/5 rounded w-2/3 mb-2"></div><div class="h-3 bg-black/5 rounded w-full"></div></div>
    <div class="card p-6 animate-pulse"><div class="cover bg-paper mb-4"></div><div class="h-5 bg-black/5 rounded w-2/3 mb-2"></div><div class="h-3 bg-black/5 rounded w-full"></div></div>
  </div>

  <!-- AI 카피 생성기 CTA -->
  <div class="card p-7 md:p-10 bg-gradient-to-br from-brand-500 to-brand-700 text-white border-0 text-center mt-10">
    <i data-lucide="sparkles" class="w-8 h-8 mx-auto mb-3"></i>
    <h2 class="text-2xl font-black">카피가 필요한가요? AI가 만들어 드립니다</h2>
    <p class="text-white/85 mt-2 text-sm">제품 정보만 입력하면 네이버·메타·카카오·구글 카피를 동시에 생성합니다. 비로그인 일 3회 무료.</p>
    <a href="/copy-generator.html" class="inline-flex items-center gap-1.5 mt-5 bg-white text-brand-600 hover:bg-brand-50 rounded-lg px-5 py-2.5 text-sm font-bold">
      카피 생성기 열기 <i data-lucide="arrow-right" class="w-4 h-4"></i>
    </a>
  </div>

</main>

<footer class="border-t border-black/5 bg-white py-8 mt-10">
  <div class="container-x text-center text-xs text-black/45 space-x-3">
    <a href="/" class="hover:text-black">메인</a>
    <span>·</span>
    <a href="/resources.html" class="hover:text-black font-bold text-black">자료실</a>
    <span>·</span>
    <a href="/agencies.html" class="hover:text-black">대행사 디렉토리</a>
    <span>·</span>
    <a href="/terms.html" class="hover:text-black">이용약관</a>
    <span>·</span>
    <a href="/privacy.html" class="hover:text-black">개인정보처리방침</a>
  </div>
</footer>

<script>
  lucide.createIcons();
  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);
  const fmt = new Intl.NumberFormat('ko-KR');
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  const CAT_LABEL = {
    'copy-pack': '카피',
    'checklist': '체크리스트',
    'cheatsheet': '치트시트',
    'workbook': '워크북',
    'glossary': '용어사전',
  };

  let currentCat = 'all';

  async function load() {
    try {
      const url = currentCat === 'all' ? '/api/resources' : '/api/resources?category=' + currentCat;
      const r = await fetch(url);
      const { resources } = await r.json();
      $('#result-meta').textContent = `총 ${resources.length}개 자료`;

      if (resources.length === 0) {
        $('#resource-grid').innerHTML = '<div class="md:col-span-2 lg:col-span-3 card p-12 text-center text-sm text-black/45">아직 자료가 없습니다.</div>';
        return;
      }

      $('#resource-grid').innerHTML = resources.map(r => {
        const grad = r.cover_gradient ? r.cover_gradient.split(',') : ['#3a5bff', '#1f37c4'];
        return `
          <a href="/resource.html?slug=${encodeURIComponent(r.slug)}" class="card lift p-5 block">
            <div class="cover" style="background: linear-gradient(135deg, ${grad[0]} 0%, ${grad[1] || grad[0]} 100%);">
              <div class="absolute inset-0 flex items-center justify-center text-white">
                <div class="text-center px-6">
                  <div class="text-[11px] font-bold uppercase tracking-widest opacity-80">${CAT_LABEL[r.category] || r.category}</div>
                  <div class="font-black text-base md:text-lg mt-1.5 leading-tight line-clamp-2">${escapeHtml(r.title)}</div>
                </div>
              </div>
            </div>
            <div class="mt-4">
              <div class="flex items-center gap-2 mb-2">
                <span class="cat-pill cat-${r.category}">${CAT_LABEL[r.category]}</span>
                ${r.is_featured ? '<span class="cat-pill" style="background:#fef3c7;color:#92400e;">⭐ 추천</span>' : ''}
              </div>
              <p class="text-[13px] text-black/65 line-clamp-2 leading-relaxed">${escapeHtml(r.description || '')}</p>
              <div class="flex items-center gap-3 mt-4 text-[11px] text-black/45">
                <span class="flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i>${r.read_time}분</span>
                <span class="flex items-center gap-1"><i data-lucide="eye" class="w-3 h-3"></i>${fmt.format(r.view_count)}</span>
              </div>
            </div>
          </a>
        `;
      }).join('');
      lucide.createIcons();
    } catch {
      $('#resource-grid').innerHTML = '<div class="md:col-span-2 lg:col-span-3 card p-8 text-center text-rose-500">불러오기 실패</div>';
    }
  }

  $$('.cat-tab').forEach(t => t.addEventListener('click', () => {
    currentCat = t.dataset.cat;
    $$('.cat-tab').forEach(x => {
      x.classList.remove('bg-ink','text-white');
      x.classList.add('bg-white','border','border-black/10');
    });
    t.classList.add('bg-ink','text-white');
    t.classList.remove('bg-white','border','border-black/10');
    load();
  }));

  load();
</script>
<script src="/ui.js"></script>
</body>
</html>
