<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>자료 — 마케톡</title>
<link rel="stylesheet" href="/tailwind.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  body { background:#f6f7f9; color:#15171c; }
  .container-x { max-width:880px; margin:0 auto; padding:0 1rem; }
  .card { background:#fff; border:1px solid #eaecef; border-radius:14px; }

  /* 마크다운 렌더 */
  .md-body h1 { font-size:1.8rem; font-weight:900; margin:1.5rem 0 1rem; line-height:1.25; }
  .md-body h2 { font-size:1.4rem; font-weight:800; margin:2rem 0 .8rem; line-height:1.3; padding-top:.5rem; border-top:1px solid #eaecef; }
  .md-body h2:first-child { border-top:none; padding-top:0; margin-top:0; }
  .md-body h3 { font-size:1.1rem; font-weight:700; margin:1.4rem 0 .6rem; }
  .md-body p { line-height:1.78; margin:1rem 0; font-size:15.5px; color:#222; }
  .md-body ul, .md-body ol { margin:1rem 0 1rem 1.4rem; }
  .md-body ul li { list-style:disc; margin:.4rem 0; line-height:1.7; font-size:15px; }
  .md-body ol li { list-style:decimal; margin:.4rem 0; line-height:1.7; font-size:15px; }
  .md-body table { width:100%; border-collapse:collapse; margin:1.2rem 0; font-size:13.5px; }
  .md-body th { background:#f6f7f9; font-weight:700; padding:8px 10px; border:1px solid #e5e7eb; text-align:left; }
  .md-body td { padding:8px 10px; border:1px solid #e5e7eb; }
  .md-body code { background:#f6f7f9; padding:1px 6px; border-radius:4px; font-size:.9em; font-family:ui-monospace,monospace; }
  .md-body strong { font-weight:700; color:#0b0d12; }
  .md-body blockquote { border-left:3px solid #ff3e5f; padding:.5rem 1rem; background:#fff5f7; margin:1rem 0; color:#5b1623; font-size:14px; }
  .md-body hr { border:none; border-top:1px solid #eaecef; margin:2rem 0; }
  .md-body input[type="checkbox"] { margin-right:6px; transform:scale(1.1); accent-color:#ff3e5f; }
</style>
</head>
<body class="antialiased">

<header class="bg-white border-b border-black/5">
  <div class="container-x flex items-center justify-between h-14">
    <a href="/" class="flex items-center gap-2.5">
      <img src="/logo.svg" alt="마케톡" class="w-8 h-8" />
      <span class="font-extrabold tracking-tight">마케톡</span>
    </a>
    <a href="/resources.html" class="text-sm text-black/55 hover:text-black inline-flex items-center gap-1">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> 자료실
    </a>
  </div>
</header>

<main class="container-x my-8" id="root">
  <div class="card p-12 text-center text-sm text-black/45">불러오는 중...</div>
</main>

<div class="container-x mt-6 mb-8 flex justify-center">
  <script src="https://ads-partners.coupang.com/g.js"></script>
  <script>new PartnersCoupang.G({"id":980738,"template":"carousel","trackingCode":"AF8531424","width":"728","height":"90","tsource":""});</script>
</div>

<footer class="border-t border-black/5 bg-white py-8">
  <div class="container-x text-center text-xs text-black/45 space-x-3">
    <a href="/" class="hover:text-black">메인</a>
    <span>·</span>
    <a href="/resources.html" class="hover:text-black">자료실</a>
    <span>·</span>
    <a href="/copy-generator.html" class="hover:text-black">카피 생성기</a>
    <span>·</span>
    <a href="/terms.html" class="hover:text-black">이용약관</a>
  </div>
</footer>

<script>
  lucide.createIcons();
  const $ = (s) => document.querySelector(s);
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // 매우 단순한 마크다운 렌더러 (h1-h3, list, table, code, blockquote, hr, bold)
  function renderMarkdown(md) {
    let out = md;

    // 코드 인라인 (먼저)
    out = out.replace(/`([^`\n]+)`/g, '<code>$1</code>');

    // 표 (multi-line)
    out = out.replace(/((?:^\|.*\|.*$\n?)+)/gm, (match) => {
      const lines = match.trim().split('\n');
      if (lines.length < 2) return match;
      const header = lines[0].split('|').slice(1, -1).map(s => s.trim());
      const sep = lines[1];
      if (!/^\|[\s\-:|]+\|$/.test(sep)) return match;
      const rows = lines.slice(2).map(l => l.split('|').slice(1, -1).map(s => s.trim()));
      return `<table><thead><tr>${header.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${
        rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')
      }</tbody></table>`;
    });

    // 헤더
    out = out.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    out = out.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    out = out.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // hr
    out = out.replace(/^---+$/gm, '<hr/>');

    // blockquote
    out = out.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

    // bold
    out = out.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');

    // 체크박스
    out = out.replace(/^- \[ \] (.+)$/gm, '<li><input type="checkbox" disabled/> $1</li>');
    out = out.replace(/^- \[x\] (.+)$/gmi, '<li><input type="checkbox" checked disabled/> $1</li>');

    // 리스트 (- 또는 *)
    out = out.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
    out = out.replace(/(<li>.*<\/li>(\n<li>.*<\/li>)*)/g, (m) => `<ul>${m}</ul>`);

    // 숫자 리스트
    out = out.replace(/^\d+\. (.+)$/gm, '<oli>$1</oli>');
    out = out.replace(/(<oli>.*<\/oli>(\n<oli>.*<\/oli>)*)/g, (m) => `<ol>${m.replace(/oli>/g, 'li>')}</ol>`);

    // 단락 (빈 줄 기준)
    out = out.split(/\n\n+/).map(block => {
      block = block.trim();
      if (!block) return '';
      if (block.startsWith('<')) return block;
      return '<p>' + block.replace(/\n/g, '<br/>') + '</p>';
    }).join('\n');

    return out;
  }

  const slug = new URLSearchParams(location.search).get('slug');
  if (!slug) {
    document.body.innerHTML = '<div class="container-x py-32 text-center"><p>잘못된 접근입니다.</p></div>';
    throw new Error('no slug');
  }

  const CAT_LABEL = {
    'copy-pack':'카피', 'checklist':'체크리스트', 'cheatsheet':'치트시트',
    'workbook':'워크북', 'glossary':'용어사전',
  };

  async function load() {
    try {
      const r = await fetch('/api/resources/' + encodeURIComponent(slug));
      if (!r.ok) throw new Error('not_found');
      const { resource: res } = await r.json();
      document.title = `${res.title} — 마케톡 자료실`;

      const grad = res.cover_gradient ? res.cover_gradient.split(',') : ['#3a5bff','#1f37c4'];

      $('#root').innerHTML = `
        <div class="card overflow-hidden">
          <!-- 커버 -->
          <div class="px-7 md:px-10 py-10 text-white" style="background:linear-gradient(135deg, ${grad[0]} 0%, ${grad[1] || grad[0]} 100%)">
            <div class="text-[11px] font-bold uppercase tracking-widest opacity-90 mb-3">${CAT_LABEL[res.category] || res.category}</div>
            <h1 class="text-3xl md:text-4xl font-black tracking-tight leading-tight">${escapeHtml(res.title)}</h1>
            ${res.subtitle ? `<p class="mt-3 text-white/85">${escapeHtml(res.subtitle)}</p>` : ''}
            <div class="flex items-center gap-4 mt-5 text-[12px] text-white/80">
              <span class="flex items-center gap-1"><i data-lucide="clock" class="w-3.5 h-3.5"></i>${res.read_time}분</span>
              <span class="flex items-center gap-1"><i data-lucide="eye" class="w-3.5 h-3.5"></i>${res.view_count}</span>
              <span class="flex items-center gap-1"><i data-lucide="download" class="w-3.5 h-3.5"></i>${res.download_count}</span>
            </div>
          </div>

          <!-- 본문 -->
          <div class="px-7 md:px-10 py-8">
            <div class="md-body" id="body">${renderMarkdown(res.body)}</div>
          </div>

          <!-- 다운로드 영역 -->
          <div class="px-7 md:px-10 py-5 bg-paper border-t border-black/5 flex items-center justify-between flex-wrap gap-3">
            <div class="text-[12px] text-black/55">이 자료가 도움이 되셨다면 공유해 주세요</div>
            <div class="flex gap-2">
              <button id="copy-btn" class="inline-flex items-center gap-1.5 px-4 h-10 bg-paper hover:bg-black/5 border border-black/10 rounded-lg text-sm font-bold">
                <i data-lucide="copy" class="w-3.5 h-3.5"></i> 본문 복사
              </button>
              <button id="dl-btn" class="inline-flex items-center gap-1.5 px-5 h-10 bg-brand-500 hover:bg-brand-600 text-white rounded-lg text-sm font-bold">
                <i data-lucide="download" class="w-3.5 h-3.5"></i> .md 다운로드
              </button>
            </div>
          </div>
        </div>

        <div class="text-center mt-8">
          <a href="/resources.html" class="text-sm text-black/55 hover:text-black">← 자료실로 돌아가기</a>
        </div>
      `;
      lucide.createIcons();

      // 본문 복사
      $('#copy-btn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(res.body);
          $('#copy-btn').innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5"></i> 복사됨';
          lucide.createIcons();
          setTimeout(() => {
            $('#copy-btn').innerHTML = '<i data-lucide="copy" class="w-3.5 h-3.5"></i> 본문 복사';
            lucide.createIcons();
          }, 2000);
        } catch { alert('복사 실패'); }
      });

      // 마크다운 다운로드
      $('#dl-btn').addEventListener('click', () => {
        const blob = new Blob([res.body], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = res.slug + '.md';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        // 카운트 +1
        fetch('/api/resources/' + res.id + '/download', { method: 'POST' }).catch(() => {});
      });

    } catch (err) {
      $('#root').innerHTML = '<div class="card p-12 text-center"><p class="text-sm text-black/45">자료를 찾을 수 없습니다.</p><a href="/resources.html" class="mt-4 inline-block text-brand-500 underline">자료실로 →</a></div>';
    }
  }
  load();
</script>
<script src="/ui.js"></script>
</body>
</html>
