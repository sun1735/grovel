<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 카피 생성기 — 마케톡</title>
<meta name="description" content="제품 정보 입력만으로 네이버·메타·카카오·구글 광고 카피를 동시에 생성합니다." />
<link rel="stylesheet" href="/tailwind.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  body { background:#f6f7f9; color:#15171c; }
  .container-x { max-width:1080px; margin:0 auto; padding:0 1rem; }
  .card { background-color:#fff; border:1px solid #eaecef; border-radius:14px; }
  .plat-btn { padding:8px 14px; border:2px solid #e5e7eb; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; transition:all .15s; background:#fff; }
  .plat-btn.active { border-color:#ff3e5f; background:#fff1f3; color:#c41635; }
  .copy-card { transition:all .15s; }
  .copy-card:hover { background:#fafbfc; }
  .copy-tab { padding:10px 16px; font-size:13px; font-weight:700; color:#9aa1aa; border-bottom:2px solid transparent; cursor:pointer; }
  .copy-tab.active { color:#15171c; border-bottom-color:#ff3e5f; }
  .spinner { width:24px; height:24px; border:3px solid #ffe1e6; border-top-color:#ff3e5f; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="antialiased">

<div class="bg-ink text-white text-xs">
  <div class="container-x flex items-center justify-between h-9">
    <a href="/" class="text-white/80 hover:text-white">← 마케톡 메인</a>
    <div class="flex items-center gap-3 text-white/70">
      <a href="/login.html" class="hover:text-white">로그인</a>
      <span class="text-white/30">|</span>
      <a href="/login.html#register" class="hover:text-white">회원가입</a>
    </div>
  </div>
</div>

<header class="bg-white border-b border-black/5">
  <div class="container-x flex items-center gap-4 h-16">
    <a href="/" class="flex items-center gap-2.5">
      <img src="/logo.svg" alt="마케톡" class="w-9 h-9" />
      <div class="leading-tight">
        <div class="font-extrabold text-lg tracking-tight">마케톡</div>
        <div class="text-[10px] text-black/50">AI 카피 생성기</div>
      </div>
    </a>
    <div class="flex-1"></div>
    <a href="/resources.html" class="hidden md:inline-flex items-center gap-1.5 px-3.5 h-9 bg-paper hover:bg-black/5 rounded-lg text-sm font-bold">
      <i data-lucide="library" class="w-3.5 h-3.5"></i> 자료실
    </a>
  </div>
</header>

<main class="container-x my-8 space-y-6">

  <div class="text-center max-w-2xl mx-auto py-4">
    <div class="inline-flex items-center gap-2 bg-brand-50 text-brand-700 px-3 py-1 rounded-full text-[12px] font-bold mb-3">
      <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
      AI COPY GENERATOR
    </div>
    <h1 class="text-3xl md:text-4xl font-black tracking-tight">광고 카피, AI가 만들어 드립니다</h1>
    <p class="text-sm text-black/55 mt-3">제품 정보 + 플랫폼만 선택하세요. 한국 광고 글자수·정책에 맞춰 자동 생성합니다.</p>
  </div>

  <!-- 사용량 표시 -->
  <div id="usage-bar" class="card px-5 py-3 flex items-center justify-between text-sm">
    <div class="flex items-center gap-2 text-black/65">
      <i data-lucide="zap" class="w-4 h-4 text-brand-500"></i>
      <span>오늘 남은 횟수: <b id="usage-remaining" class="text-brand-600">…</b> / <span id="usage-limit">…</span></span>
    </div>
    <div class="text-[11px] text-black/45" id="usage-hint">로그인하면 일 20회까지 가능</div>
  </div>

  <!-- 입력 폼 -->
  <form id="copy-form" class="card p-6 md:p-8">
    <div class="grid md:grid-cols-2 gap-5">
      <div>
        <label class="text-[11px] font-bold text-black/55 block mb-1.5">제품/서비스 이름 <span class="text-rose-500">*</span></label>
        <input type="text" name="product" required minlength="2" maxlength="100" placeholder="예: 강남 1인 셀프 네일 매장"
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30" />
      </div>
      <div>
        <label class="text-[11px] font-bold text-black/55 block mb-1.5">카테고리</label>
        <input type="text" name="category" maxlength="64" placeholder="예: 뷰티, 식품, 교육, SaaS"
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30" />
      </div>
      <div class="md:col-span-2">
        <label class="text-[11px] font-bold text-black/55 block mb-1.5">타겟 고객 (구체적일수록 좋음)</label>
        <input type="text" name="target" maxlength="200" placeholder="예: 강남에서 일하는 25-35세 직장인 여성, 점심시간에 빠르게 네일 받고 싶은"
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30" />
      </div>
      <div class="md:col-span-2">
        <label class="text-[11px] font-bold text-black/55 block mb-1.5">톤앤매너</label>
        <div class="flex flex-wrap gap-2">
          <label class="cursor-pointer">
            <input type="radio" name="tone" value="friendly" class="hidden peer" checked />
            <span class="plat-btn peer-checked:active inline-block">친근하게</span>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="tone" value="professional" class="hidden peer" />
            <span class="plat-btn peer-checked:active inline-block">전문적으로</span>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="tone" value="emotional" class="hidden peer" />
            <span class="plat-btn peer-checked:active inline-block">감성적으로</span>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="tone" value="urgent" class="hidden peer" />
            <span class="plat-btn peer-checked:active inline-block">긴급하게</span>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="tone" value="humorous" class="hidden peer" />
            <span class="plat-btn peer-checked:active inline-block">유머러스하게</span>
          </label>
        </div>
      </div>
      <div class="md:col-span-2">
        <label class="text-[11px] font-bold text-black/55 block mb-1.5">생성할 플랫폼 <span class="text-rose-500">*</span> <span class="text-black/40 font-normal">(최대 4개)</span></label>
        <div id="plat-grid" class="flex flex-wrap gap-2">
          <button type="button" data-plat="naver"     class="plat-btn">🟢 네이버 검색광고</button>
          <button type="button" data-plat="meta"      class="plat-btn">🔵 메타 (페북·인스타)</button>
          <button type="button" data-plat="kakao"     class="plat-btn">🟡 카카오 비즈보드</button>
          <button type="button" data-plat="google"    class="plat-btn">🔴 구글 검색광고</button>
          <button type="button" data-plat="youtube"   class="plat-btn">▶️ 유튜브 5초 후킹</button>
          <button type="button" data-plat="instagram" class="plat-btn">📸 인스타 캐러셀</button>
        </div>
      </div>
    </div>

    <div id="form-err" class="hidden mt-4 text-sm text-rose-600"></div>

    <div class="mt-6 flex justify-end">
      <button type="submit" id="submit-btn" class="inline-flex items-center gap-2 px-6 h-11 bg-brand-500 hover:bg-brand-600 text-white rounded-lg text-sm font-bold">
        <i data-lucide="sparkles" class="w-4 h-4"></i> 카피 생성
      </button>
    </div>
  </form>

  <!-- 결과 영역 -->
  <div id="result-card" class="card p-6 hidden">
    <div class="flex items-center justify-between border-b border-black/5 pb-3 mb-4">
      <div class="font-extrabold text-[15px]">생성 결과</div>
      <div id="result-meta" class="text-[11px] text-black/45"></div>
    </div>
    <div id="result-tabs" class="flex gap-1 overflow-x-auto border-b border-black/5 mb-5"></div>
    <div id="result-body"></div>
  </div>

  <!-- 로딩 -->
  <div id="loading" class="hidden card p-12 text-center">
    <div class="spinner mx-auto"></div>
    <p class="mt-4 text-sm text-black/55">AI가 카피를 만들고 있어요... (10-15초)</p>
  </div>

</main>

<div class="container-x mt-6 mb-8 flex justify-center">
  <script src="https://ads-partners.coupang.com/g.js"></script>
  <script>new PartnersCoupang.G({"id":980738,"template":"carousel","trackingCode":"AF8531424","width":"728","height":"90","tsource":""});</script>
</div>

<footer class="border-t border-black/5 bg-white py-8 mt-10">
  <div class="container-x text-center text-xs text-black/45 space-x-3">
    <a href="/" class="hover:text-black">메인</a>
    <span>·</span>
    <a href="/resources.html" class="hover:text-black">자료실</a>
    <span>·</span>
    <a href="/copy-generator.html" class="hover:text-black font-bold text-black">카피 생성기</a>
    <span>·</span>
    <a href="/terms.html" class="hover:text-black">이용약관</a>
  </div>
</footer>

<script>
  lucide.createIcons();
  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // ── 사용량 ──
  async function loadUsage() {
    try {
      const r = await fetch('/api/copy/usage', { credentials:'same-origin' });
      const u = await r.json();
      $('#usage-remaining').textContent = u.remaining;
      $('#usage-limit').textContent = u.limit;
      $('#usage-hint').textContent = u.is_logged_in
        ? `로그인 사용자 · 매일 ${u.limit}회 무료`
        : `비로그인 · 회원가입하면 일 20회 가능`;
    } catch {}
  }
  loadUsage();

  // ── 플랫폼 선택 ──
  const selectedPlats = new Set();
  $$('[data-plat]').forEach(btn => btn.addEventListener('click', () => {
    const p = btn.dataset.plat;
    if (selectedPlats.has(p)) {
      selectedPlats.delete(p);
      btn.classList.remove('active');
    } else {
      if (selectedPlats.size >= 4) {
        mtToast('최대 4개 플랫폼까지 선택 가능합니다.', 'warn');
        return;
      }
      selectedPlats.add(p);
      btn.classList.add('active');
    }
  }));

  // ── 폼 제출 ──
  $('#copy-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    $('#form-err').classList.add('hidden');

    if (selectedPlats.size === 0) {
      $('#form-err').textContent = '플랫폼을 1개 이상 선택해 주세요.';
      $('#form-err').classList.remove('hidden');
      return;
    }

    const fd = new FormData(e.target);
    const body = {
      product:   fd.get('product'),
      category:  fd.get('category'),
      target:    fd.get('target'),
      tone:      fd.get('tone'),
      platforms: Array.from(selectedPlats),
    };

    $('#submit-btn').disabled = true;
    $('#result-card').classList.add('hidden');
    $('#loading').classList.remove('hidden');

    try {
      const r = await fetch('/api/copy/generate', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'same-origin',
        body: JSON.stringify(body),
      });
      const j = await r.json();

      if (!r.ok) {
        $('#form-err').textContent = j.message || `오류: ${j.error}`;
        $('#form-err').classList.remove('hidden');
        return;
      }

      renderResult(j);
      loadUsage();
    } catch (err) {
      $('#form-err').textContent = '네트워크 오류가 발생했습니다.';
      $('#form-err').classList.remove('hidden');
    } finally {
      $('#submit-btn').disabled = false;
      $('#loading').classList.add('hidden');
    }
  });

  // ── 결과 렌더 ──
  const PLAT_LABEL = {
    naver:'네이버 검색광고', meta:'메타', kakao:'카카오', google:'구글',
    youtube:'유튜브', instagram:'인스타 캐러셀',
  };

  function renderResult(j) {
    const platforms = Object.keys(j.copies);
    if (platforms.length === 0) {
      $('#form-err').textContent = '결과가 비어있습니다. 다시 시도해 주세요.';
      $('#form-err').classList.remove('hidden');
      return;
    }

    $('#result-meta').textContent = `${j.meta?.model?.replace('claude-','') || ''} · 토큰 ${j.meta?.input_tokens || 0}/${j.meta?.output_tokens || 0}`;

    // 탭
    $('#result-tabs').innerHTML = platforms.map((p, i) => `
      <button class="copy-tab whitespace-nowrap ${i === 0 ? 'active' : ''}" data-tab="${p}">${PLAT_LABEL[p] || p}</button>
    `).join('');

    function showTab(p) {
      $$('.copy-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === p));
      const items = j.copies[p] || [];
      $('#result-body').innerHTML = items.map((item, idx) => `
        <div class="copy-card border border-black/5 rounded-lg p-4 mb-3">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              <div class="text-[10px] font-bold text-brand-500 uppercase tracking-wider">CASE ${idx + 1}</div>
              ${item.title ? `<div class="font-extrabold text-[15px] mt-1">${escapeHtml(item.title)}</div>` : ''}
              ${item.body ? `<div class="text-[14px] text-black/75 leading-relaxed mt-1">${escapeHtml(item.body)}</div>` : ''}
            </div>
            <button class="copy-one px-3 py-1.5 bg-paper hover:bg-black/5 rounded text-[11px] font-bold whitespace-nowrap" data-text="${escapeHtml((item.title || '') + (item.body ? '\\n' + item.body : ''))}">
              <i data-lucide="copy" class="w-3 h-3 inline"></i> 복사
            </button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();

      // 복사 버튼
      $$('.copy-one').forEach(btn => btn.addEventListener('click', async () => {
        const text = btn.dataset.text;
        await navigator.clipboard.writeText(text);
        btn.innerHTML = '<i data-lucide="check" class="w-3 h-3 inline"></i> 복사됨';
        lucide.createIcons();
        setTimeout(() => {
          btn.innerHTML = '<i data-lucide="copy" class="w-3 h-3 inline"></i> 복사';
          lucide.createIcons();
        }, 1500);
      }));
    }

    showTab(platforms[0]);
    $$('.copy-tab').forEach(t => t.addEventListener('click', () => showTab(t.dataset.tab)));

    $('#result-card').classList.remove('hidden');
    $('#result-card').scrollIntoView({ behavior:'smooth', block:'start' });
  }
</script>
<script src="/ui.js"></script>
</body>
</html>
