<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>대행사 상세 — 마케톡</title>
<link rel="stylesheet" href="/tailwind.css" />
<script src="/lucide.min.js"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  body { background:#f6f7f9; color:#15171c; }
  .container-x { max-width:980px; margin:0 auto; padding:0 1rem; }
  .card { background-color:#fff; border:1px solid #eaecef; border-radius:14px; }
  .chip { display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; }
  .c-naver { background:#dcfce7; color:#15803d; }
  .c-kakao { background:#fef3c7; color:#a16207; }
  .c-meta  { background:#dbeafe; color:#1d4ed8; }
  .c-google{ background:#fee2e2; color:#b91c1c; }
  .c-youtube{ background:#fee2e2; color:#b91c1c; }
  .c-tiktok{ background:#f3e8ff; color:#7e22ce; }
  .c-coupang{ background:#ffedd5; color:#9a3412; }
  .c-smartstore{ background:#dcfce7; color:#15803d; }
  .c-content{ background:#fce7f3; color:#be185d; }
  .c-design{ background:#e0e7ff; color:#3730a3; }
  .c-data { background:#cffafe; color:#0e7490; }
  .c-seo  { background:#d1fae5; color:#047857; }
  .c-brand{ background:#fef3c7; color:#92400e; }
  .desc { white-space:pre-wrap; line-height:1.78; font-size:15px; color:#222; word-break:keep-all; }
</style>
</head>
<body class="antialiased">

<header class="bg-white border-b border-black/5">
  <div class="container-x flex items-center justify-between h-14">
    <a href="/" class="flex items-center gap-2.5">
      <img src="/logo.svg" alt="마케톡" class="w-8 h-8" />
      <span class="font-extrabold tracking-tight">마케톡</span>
    </a>
    <a href="/agencies.html" class="text-sm text-black/55 hover:text-black inline-flex items-center gap-1">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> 디렉토리로
    </a>
  </div>
</header>

<main class="container-x my-8" id="root">
  <div class="card p-8 text-center text-sm text-black/45">불러오는 중...</div>
</main>

<footer class="border-t border-black/5 bg-white py-8">
  <div class="container-x text-center text-xs text-black/45 space-x-3">
    <a href="/" class="hover:text-black">메인</a>
    <span>·</span>
    <a href="/agencies.html" class="hover:text-black">대행사 디렉토리</a>
    <span>·</span>
    <a href="/terms.html" class="hover:text-black">이용약관</a>
  </div>
</footer>

<script>
  lucide.createIcons();
  const $ = (s) => document.querySelector(s);
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  const SPEC_LABEL = {
    naver:'네이버', kakao:'카카오', meta:'메타', google:'구글', youtube:'유튜브',
    tiktok:'틱톡', coupang:'쿠팡', smartstore:'스마트스토어',
    content:'콘텐츠', design:'디자인', data:'데이터', seo:'SEO', brand:'브랜드'
  };

  const slug = new URLSearchParams(location.search).get('slug');
  if (!slug) {
    document.body.innerHTML = '<div class="container-x py-32 text-center"><p>잘못된 접근입니다.</p></div>';
    throw new Error('no slug');
  }

  async function load() {
    try {
      const r = await fetch('/api/agencies/' + encodeURIComponent(slug));
      if (!r.ok) throw new Error('not found');
      const { agency: a } = await r.json();
      document.title = `${a.name} — 마케톡 대행사 디렉토리`;

      const specs = (a.specialties || '').split(',').filter(Boolean);
      const initials = (a.name || '').slice(0, 2);

      $('#root').innerHTML = `
        <div class="card overflow-hidden">
          <!-- 헤더 영역 -->
          <div class="p-7 md:p-9 border-b border-black/5">
            <div class="flex items-start gap-5">
              <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 text-white flex items-center justify-center font-extrabold text-3xl flex-shrink-0">${escapeHtml(initials)}</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <h1 class="text-2xl md:text-3xl font-black tracking-tight">${escapeHtml(a.name)}</h1>
                  ${a.is_verified ? '<span class="inline-flex items-center gap-1 px-2.5 py-1 bg-blue-50 text-blue-700 rounded-full text-[11px] font-bold"><i data-lucide="badge-check" class="w-3 h-3"></i>인증 대행사</span>' : ''}
                </div>
                <p class="mt-1.5 text-[15px] text-black/65">${escapeHtml(a.tagline || '')}</p>
                <div class="flex items-center gap-2 flex-wrap mt-4">
                  ${specs.map(s => `<span class="chip c-${s}">${SPEC_LABEL[s] || s}</span>`).join('')}
                </div>
              </div>
            </div>
          </div>

          <!-- 정보 그리드 -->
          <div class="px-7 md:px-9 py-5 grid sm:grid-cols-3 gap-4 text-sm border-b border-black/5">
            ${a.location ? `<div><div class="text-[11px] font-bold text-black/45 uppercase">위치</div><div class="font-semibold mt-0.5 flex items-center gap-1"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i> ${escapeHtml(a.location)}</div></div>` : ''}
            ${a.team_size ? `<div><div class="text-[11px] font-bold text-black/45 uppercase">규모</div><div class="font-semibold mt-0.5 flex items-center gap-1"><i data-lucide="users" class="w-3.5 h-3.5"></i> ${escapeHtml(a.team_size)}인</div></div>` : ''}
            ${a.founded_year ? `<div><div class="text-[11px] font-bold text-black/45 uppercase">설립</div><div class="font-semibold mt-0.5 flex items-center gap-1"><i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${a.founded_year}년</div></div>` : ''}
          </div>

          <!-- 설명 -->
          <div class="px-7 md:px-9 py-7">
            <h2 class="text-[11px] font-bold text-black/45 uppercase mb-3">소개</h2>
            <div class="desc">${escapeHtml(a.description || '소개 정보가 없습니다.')}</div>
          </div>

          <!-- 연락처 / CTA -->
          <div class="px-7 md:px-9 py-5 bg-paper border-t border-black/5 flex items-center justify-between gap-3 flex-wrap">
            <div class="text-sm">
              ${a.contact_email ? `<div class="flex items-center gap-1.5 text-black/70"><i data-lucide="mail" class="w-3.5 h-3.5"></i> <a href="mailto:${escapeHtml(a.contact_email)}" class="hover:text-brand-500 hover:underline">${escapeHtml(a.contact_email)}</a></div>` : ''}
              ${a.contact_phone ? `<div class="flex items-center gap-1.5 text-black/70 mt-1"><i data-lucide="phone" class="w-3.5 h-3.5"></i> ${escapeHtml(a.contact_phone)}</div>` : ''}
            </div>
            ${a.website_url ? `<a href="${escapeHtml(a.website_url)}" target="_blank" rel="noopener" data-aid="${a.id}" class="inline-flex items-center gap-1.5 px-5 h-10 bg-brand-500 hover:bg-brand-600 text-white rounded-lg text-sm font-bold website-btn">웹사이트 방문 <i data-lucide="external-link" class="w-3.5 h-3.5"></i></a>` : ''}
          </div>
        </div>

        <div class="text-center mt-6">
          <a href="/agencies.html" class="text-sm text-black/55 hover:text-black">← 디렉토리로 돌아가기</a>
        </div>
      `;
      lucide.createIcons();

      // 웹사이트 클릭 트래킹
      document.querySelectorAll('.website-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          fetch('/api/agencies/' + btn.dataset.aid + '/click', { method:'POST' }).catch(()=>{});
        });
      });
    } catch (err) {
      $('#root').innerHTML = '<div class="card p-12 text-center"><p class="text-sm text-black/45">대행사를 찾을 수 없습니다.</p><a href="/agencies.html" class="mt-4 inline-block text-brand-500 underline">디렉토리로 →</a></div>';
    }
  }
  load();
</script>
<script src="/ui.js"></script>
</body>
</html>
