<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>비밀번호 재설정 — 마케톡</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: { sans: ['Pretendard Variable','Pretendard','system-ui','sans-serif'] },
    colors: { paper:'#f6f7f9', ink:'#15171c', brand:{50:'#fff1f3',500:'#ff3e5f',600:'#ed1f43'} }
  }}}
</script>
<style>
  body { background:#f6f7f9; color:#15171c; }
  .card { background:#fff; border:1px solid #eaecef; border-radius:16px; }
  input:focus { outline:none; box-shadow:0 0 0 3px rgba(255,62,95,.12); border-color:#ff3e5f; }
</style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">

    <div class="text-center mb-6">
      <a href="/" class="inline-flex items-center gap-2.5">
        <div class="w-10 h-10 rounded-xl bg-brand-500 flex items-center justify-center">
          <i data-lucide="message-square-text" class="w-5 h-5 text-white"></i>
        </div>
        <span class="font-extrabold text-xl tracking-tight">마케톡</span>
      </a>
    </div>

    <div id="no-token" class="hidden card p-8 text-center">
      <i data-lucide="alert-circle" class="w-10 h-10 text-rose-400 mx-auto mb-3"></i>
      <h2 class="font-extrabold text-lg">유효하지 않은 링크</h2>
      <p class="text-sm text-black/55 mt-2">비밀번호 재설정 링크가 없거나 만료되었습니다.</p>
      <a href="/forgot-password.html" class="mt-4 inline-block text-brand-500 underline text-sm">다시 요청하기</a>
    </div>

    <form id="form-reset" class="card p-6 space-y-3 hidden">
      <h2 class="font-extrabold text-lg text-center mb-2">새 비밀번호 설정</h2>
      <p class="text-[13px] text-black/60 text-center">새 비밀번호를 입력하세요 (8자 이상)</p>
      <div>
        <label class="text-xs font-bold text-black/60 block mb-1.5">새 비밀번호</label>
        <input type="password" name="password" required minlength="8" autocomplete="new-password"
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm" placeholder="••••••••" />
      </div>
      <div>
        <label class="text-xs font-bold text-black/60 block mb-1.5">비밀번호 확인</label>
        <input type="password" name="confirm" required minlength="8"
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm" placeholder="••••••••" />
      </div>
      <div id="reset-err" class="hidden text-sm text-rose-600"></div>
      <button type="submit" class="w-full h-11 bg-brand-500 text-white rounded-lg text-sm font-bold hover:bg-brand-600">비밀번호 변경</button>
    </form>

    <div id="success" class="hidden card p-8 text-center">
      <i data-lucide="check-circle-2" class="w-10 h-10 text-emerald-500 mx-auto mb-3"></i>
      <h2 class="font-extrabold text-lg">비밀번호가 변경되었습니다</h2>
      <p class="text-sm text-black/55 mt-2">새 비밀번호로 로그인하세요.</p>
      <a href="/login.html" class="mt-4 inline-flex items-center gap-1.5 bg-ink text-white rounded-lg px-5 py-2.5 text-sm font-bold">로그인 →</a>
    </div>

  </div>

<script>
  lucide.createIcons();
  const $ = (s) => document.querySelector(s);
  const token = new URLSearchParams(location.search).get('token');

  if (!token) {
    $('#no-token').classList.remove('hidden');
    lucide.createIcons();
  } else {
    $('#form-reset').classList.remove('hidden');
  }

  $('#form-reset')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    $('#reset-err').classList.add('hidden');

    const pw = e.target.password.value;
    const confirm = e.target.confirm.value;
    if (pw !== confirm) {
      $('#reset-err').textContent = '비밀번호가 일치하지 않습니다.';
      $('#reset-err').classList.remove('hidden');
      return;
    }

    try {
      const r = await fetch('/api/auth/reset-password', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ token, new_password: pw }),
      });
      const j = await r.json();
      if (r.ok) {
        $('#form-reset').classList.add('hidden');
        $('#success').classList.remove('hidden');
        lucide.createIcons();
      } else {
        $('#reset-err').textContent = j.message || '오류가 발생했습니다.';
        $('#reset-err').classList.remove('hidden');
      }
    } catch {
      $('#reset-err').textContent = '네트워크 오류';
      $('#reset-err').classList.remove('hidden');
    }
  });
</script>
</body>
</html>
