<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>아이디/비밀번호 찾기 — 마케톡</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: { sans: ['Pretendard Variable','Pretendard','system-ui','sans-serif'] },
    colors: { paper:'#f6f7f9', ink:'#15171c', brand:{50:'#fff1f3',500:'#ff3e5f',600:'#ed1f43'} }
  }}}
</script>
<style>
  body { background:#f6f7f9; color:#15171c; }
  .card { background:#fff; border:1px solid #eaecef; border-radius:16px; }
  input:focus { outline:none; box-shadow:0 0 0 3px rgba(255,62,95,.12); border-color:#ff3e5f; }
</style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">

    <div class="text-center mb-6">
      <a href="/" class="inline-flex items-center gap-2.5">
        <div class="w-10 h-10 rounded-xl bg-brand-500 flex items-center justify-center">
          <i data-lucide="message-square-text" class="w-5 h-5 text-white"></i>
        </div>
        <span class="font-extrabold text-xl tracking-tight">마케톡</span>
      </a>
    </div>

    <!-- 탭 -->
    <div class="flex gap-1 mb-4 bg-paper rounded-xl p-1">
      <button id="tab-email" class="flex-1 h-10 rounded-lg text-sm font-bold bg-white shadow-sm">이메일 찾기</button>
      <button id="tab-pw"    class="flex-1 h-10 rounded-lg text-sm font-bold text-black/55 hover:text-black">비밀번호 재설정</button>
    </div>

    <!-- 이메일 찾기 -->
    <form id="form-email" class="card p-6 space-y-3">
      <p class="text-[13px] text-black/60 leading-relaxed">
        가입 시 사용한 <b>닉네임</b>을 입력하시면 이메일(아이디)을 마스킹 처리하여 보여드립니다.
      </p>
      <div>
        <label class="text-xs font-bold text-black/60 block mb-1.5">닉네임</label>
        <input type="text" name="nickname" required minlength="2"
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm" placeholder="가입 시 설정한 닉네임" />
      </div>
      <div id="email-result" class="hidden"></div>
      <button type="submit" class="w-full h-11 bg-ink text-white rounded-lg text-sm font-bold hover:bg-black/85">이메일 찾기</button>
    </form>

    <!-- 비밀번호 재설정 -->
    <form id="form-pw" class="card p-6 space-y-3 hidden">
      <p class="text-[13px] text-black/60 leading-relaxed">
        가입한 <b>이메일</b>을 입력하시면 비밀번호 재설정 안내를 보내드립니다.
      </p>
      <div>
        <label class="text-xs font-bold text-black/60 block mb-1.5">이메일</label>
        <input type="email" name="email" required
               class="w-full h-11 px-3.5 rounded-lg border border-black/10 text-sm" placeholder="you@example.com" />
      </div>
      <div id="pw-result" class="hidden"></div>
      <button type="submit" class="w-full h-11 bg-brand-500 text-white rounded-lg text-sm font-bold hover:bg-brand-600">재설정 요청</button>
    </form>

    <div class="text-center mt-6 space-x-3 text-xs text-black/50">
      <a href="/login.html" class="hover:text-black">← 로그인</a>
      <span>·</span>
      <a href="/login.html#register" class="hover:text-black">회원가입</a>
    </div>
  </div>

<script>
  lucide.createIcons();
  const $ = (s) => document.querySelector(s);

  // 탭 전환
  $('#tab-email').addEventListener('click', () => {
    $('#tab-email').classList.add('bg-white','shadow-sm'); $('#tab-email').classList.remove('text-black/55');
    $('#tab-pw').classList.remove('bg-white','shadow-sm'); $('#tab-pw').classList.add('text-black/55');
    $('#form-email').classList.remove('hidden'); $('#form-pw').classList.add('hidden');
  });
  $('#tab-pw').addEventListener('click', () => {
    $('#tab-pw').classList.add('bg-white','shadow-sm'); $('#tab-pw').classList.remove('text-black/55');
    $('#tab-email').classList.remove('bg-white','shadow-sm'); $('#tab-email').classList.add('text-black/55');
    $('#form-pw').classList.remove('hidden'); $('#form-email').classList.add('hidden');
  });

  // 이메일 찾기
  $('#form-email').addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = $('#email-result');
    res.classList.add('hidden');
    const nickname = e.target.nickname.value.trim();
    try {
      const r = await fetch('/api/auth/find-email', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ nickname }),
      });
      const j = await r.json();
      if (r.ok) {
        res.className = 'p-4 rounded-lg bg-emerald-50 text-emerald-800 text-sm';
        res.innerHTML = `<div class="font-bold mb-1">이메일을 찾았습니다</div>
          <div class="text-lg font-extrabold">${j.masked_email}</div>
          <div class="text-[11px] mt-2 text-emerald-600">보안을 위해 일부가 ***로 가려져 있습니다.</div>`;
      } else {
        res.className = 'p-3 rounded-lg bg-rose-50 text-rose-700 text-sm';
        res.textContent = j.message || '계정을 찾을 수 없습니다.';
      }
      res.classList.remove('hidden');
    } catch {
      res.className = 'p-3 rounded-lg bg-rose-50 text-rose-700 text-sm';
      res.textContent = '네트워크 오류';
      res.classList.remove('hidden');
    }
  });

  // 비밀번호 재설정
  $('#form-pw').addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = $('#pw-result');
    res.classList.add('hidden');
    const email = e.target.email.value.trim();
    try {
      const r = await fetch('/api/auth/forgot-password', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email }),
      });
      const j = await r.json();
      res.className = 'p-4 rounded-lg bg-blue-50 text-blue-800 text-sm';
      res.innerHTML = `<div class="font-bold mb-1">요청이 접수되었습니다</div>
        <div>${j.message || '관리자가 확인 후 재설정 링크를 안내드립니다.'}</div>
        <div class="text-[11px] mt-2 text-blue-600">디스코드에 참여하시면 더 빠르게 처리됩니다.</div>`;
      res.classList.remove('hidden');
    } catch {
      res.className = 'p-3 rounded-lg bg-rose-50 text-rose-700 text-sm';
      res.textContent = '네트워크 오류';
      res.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
